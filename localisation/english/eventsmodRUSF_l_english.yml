#Khasab
russiaRUSF.1466.d:0 "As our armies march into the Khasab peninsula a debate is sparked in our capital. Controlling the vital Hormuz straits the peninsula would be a great territory to maintain a military presence. However our arab allies in the region also claim the territory, and taking it away permanentely would hurt our relations with them for a long time."
#Mexico intervenes
russiaRUSFN.22.d:0 "As the American Civil War rages the Mexican syndicalists have decided to enter the fray to help their socialist bretheren in Chicago. As Mexican troops attack the southern United States, in a race to occupy the oil fields in Texas, it is expected that the WCA will soon launch an offensive from the north of the country.Governors of southern states have already denounced Reed as a sellout to foreigners and traitor to their people, and are moving troops to reinforce the border. With the entrance of Mexico the war, the already blodiest conflict in the history of the New World, is expected to reach greater levels of causalties and destruction."
russiaRUSFN.23.d:0 "As the American Civil War rages the Mexican Savinkovists have decided to enter the fray, and reverse Manifest Destiny. As Americans fight themselves in the blodiest war ever fought in the New World, the new regime in Mexico has decided to go all-in to recuperate the land lost to Manifest Destiny. Governors from southern states have denounced Mexican expansionism at the expense of America's misery, and are moving troops to reinforce the border to throw the Mexicans back. With the entrance of Mexico the war, the already blodiest conflict in the history of the New World, is expected to reach greater levels of causalties and destruction."
#Swedish Neutrality
Nordic_Neutrality:0 "Nordic Defence League"
russiaRUSF.1468.d:0 "As conflict between ourselves and Germany looms, the Swedes have begun to grow increasingly concerned about their strategic situation. Following their defense agreements with Germany after the rise of Red Norway, and now faced with our expanding influence in the Baltic, Sweden fears the prospect of encirclement. Sensing an opportunity, our diplomats have approached Stockholm with a proposal. Should Sweden maintain a position of strict neutrality in the coming war, we will guarantee their independence and security in the event of any German aggression. In return, we ask that Sweden refrain from cooperating with Germany in any invasion of Norway and deny Germany access to Swedish territory and infrastructure for military purposes."
russiaRUSF.1479.d:0 "The Swedish have informed us of a deal they made with Russia to keep out of the war and maintain their neutrality in this new european conflagration. While a betrayal to Mittleuropa a neutral Sweden still have its advantages, first it help us guarantee our Iron supplies without wartime disruptions, and second offer us a partner where we can buy war materiel for our war against the internationale. An invasion of Sweden is certainly out of the high commands wishes or priorities, so we have come to a temporary understanding with Sweden. First they will cede us temporary controll of the island of Gotland, which we will keep as long as the war in the Baltics continue, and second they will continue a member of our economic block and give us priority comercial status in detriment of Russia"
#Russian Troops enter Beijing
russiaRUSFN.24.d.1:0 "In a repeat of the 1900s the Russian Army has entered Beijing. After great battles in the Manchurian Basin the Russian Far Eastern Army has occupied much of the Northern China plain. With this victory the russians have opened the door to Central China and can now project power in the direction of the great cities of Taiyuan, Jinan, Zhengzhou and beyond. With the occupation of the Forbidden city the Northern Warlords have lost their prominence as Northen China is projected to fall into russian hands in the next few weeks. Forces in Southern China already released statements condeming Russian Imperialism and have vowed to liberate the North of the country from foreign occupation."
russiaRUSFN.24.d.2:0 "In a repeat of the 1900s the Russian Army has entered Beijing. After great battles in the Manchurian Basin the Russian Far Eastern Army has occupied much of the Northern China Plain. With this victory the russians have opened the door to Central China and can now project their power in the direction of the great cities of Taiyuan, Jinan and Zhengzhou. After this great defeat the Japanese controll of Northern China is shaken, as it is expected that the Fengtian Government will fall shortly. Military governors and politicians from all China are now courting the russians for the prospect of bargainig controll of the Northern plain after the expulsion of Japan from the mainland."
#Dukhonin monument
russiaRUSF.1481.d:0 "In the midst of the commemorations of our great victory in the Second Great Patriotic War a somber occasion took place in the town of Mogilyov. [RUS_leader] [RUS.GetLeader] and [GetArmyChief] gave and eulogy to the last Supreme Commander of the Russian Army before the end of First Weltkrieg in Russia, Nikolay Dukhonin. Dukhonin was given command of the STAVKA after the failure of Kornilov in Petrograd. Being in the terrible position of presiding the dissolution of the army, Dukhonin tried to maintan the Russian war effort and stop the bolshevist efforts to destroy Russia to the last breath of his life. The Supreme Commander, was captured by the bolshevist traitor Nikolay Krylenko, but not before giving the fatefull order to open the Bykhov prison, freeing the injustly impriosioned Kornilov and his compatriots. For his loyalty to the Russian army and people, Dukhonin was lynched by a mob lead by Krylenko's thugs. However his last order was what made the salvation of Russia possible, by freeing the prisioners of Bykhov saved Kornilov and the nucleous of the future Volunteer Army to fight another day. His body was burried in Kiev in 1917, but today was returned to the spot of the old Stavka headquarters in Mogilyov and intered with full military honours in a memorial. This event marks not only the honouring of a great russian, but also the rescue of Belarus back into the Russian world. The monument, one of the greatest ones built in the reconquered territories, will be the last resting plance and a museum dedicated to the STAVKA heroes of the first and second Weltkrieg."