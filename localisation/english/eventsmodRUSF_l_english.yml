#decision categories
RUSF_Release_Tags_Decisions:0 "A new Monarchist European Order"
RUS_Intervention_decisions:0 "Strategic Decisions"
RUS_SecondManchuriaWar:0 "Operation Kondratenko"
RUS_SecondManchuriaWar_desc:0 "(THIS WILL LEAD TO WAR WITH GERMANY IF YOU DONT CONTROLL CERTAIN TERRITORIES IN 30 DAYS) As Fengtian armies descent into China the STAVKA has saw an opportunity to teach Zuolin, and his Japanese masters, a painfull lesson. With the fall of Beijing and the Fengtian offensive into the Northern China plain the manchurian border is as lightly defended as it will ever be. The STAVKA has presented a plan of operations to capitalize on Japanese overextesion, Operation Kondratenko. This is operation aism to make a swift trike into Manchuria and cut off japanese access to mainland Asia. However if we use this opportunity to pounce on Japan our adversaries in the west will certainly take the opportunity to punish us for it if we take too long to force a Japanese surrender. (you have to complete missions to enter Harbin, Shenyang and Dalian, 30 days each, to avoid war with germany)."
RUSF_Paraguay:0 "Our friend on the other side of the world"
RUS_Par:0 "Russian Military Mission in Paraguay"
RUS_Par_desc:0 "The Russian military mission to Paraguay is helping Paraguay modernize its training and standards to bring to the country the latest of european warfare."
#Czechoslovakian Legion Events
russiaRUSF.1212.desc:0 "The Czechoslovakian Legion was founded in 1915 by the Entente powers to fight agaisnt the Habsburgs in the Weltkrieg. Its creation was part of the Entente plan to dismantle the multiethnic Habsburg Empire. Created by the recruitment of Cezch and Slovak prisioners of war, mostly in the Russian Front, the Legion was the armed arm of the Czechoslavk National Council. While the political arm of the Czechoslovaks was located in France the Legions were fighting in Russia. When the Bolshevkis couped the government the legion tried to evacuate the country by the way of the Trans-Siberian to Vladivostok, and then France, however the Legion entered armed conflict with the bolsheviks, who were trying to disarm them in compliance with the Brest-Litovsk treaty. The Legion, one of the only disciplined forces in Russia at the time, immediately seized the Trans-Siberian and proped up anti-bolshevik governments. During the Civil War the Legion was essential in the Siberian Front, however with the defeat of France and the German rapprochement with White leaders, the Legions found themselves in a limbo. While the National Council disbanded itself and most of its members relocated to outside of continental europe, the man of the Legions were exiled in Russia by the Habsburg government. During this time their veterans association works hard to maintain the ideia of Czechoslovakia alive, and with its great transit in military circles, the Czechs have effectively maintained a shadow army waiting for the right time to mobilize again."
russiaRUSF.1212.a:0 "Pravda Vitezi"
legion_volunteer:0 "Czechoslovakian Volunteers"
legion_volunteer_desc:0 "The Czechoslovakian Legion has been oficialy disbanded by the treaty of Misnk after the end of the Civil War, however every month more and more able bodied man cross the Baltic Russian border to join the emigres in Moscow. With funding secure trough wealthy Russian Patrons, specially from prince Dmitry Romanov, the Czechoslovakian Emigres are able to secure food, weapons and lodging for the men who cross the border and maintain their disproportionaly big "scouting organizations". This shadow army is now only waiting the signal to mobilize once more and free its land from Habsburg yoke." 
RUS_Syrovy:0 "Jan Syrvový"
RUS_Syrovy_desc:0 "§YGeneral Description\nBorn:§! §gJanuray 24, 1888, in Trebitsch, Kingdom of Bohemia, Habsburg Empire§!\n§YMilitary Career:§! Joined the Imperial Russian Army in 1914 as the Weltkrieg began. During the war became the leading general of the Czechoslovakian Corps, and was he who gave the order for their uprising in Siberia. During the war he was an essential leader of the Corps and played a pivotal role in their heroic struggle in the Siberian taiga. After the war his leadership ensured that the Legions stayed united even after the official disbandment. Now as the legions lie in waiting to restart the armed struggle agaisnt the Habsburgs general Syrovy is a major player in the Czechoslovakian National Council and works tirelesly to maintain the legions prepared and trained to free their motherland."
RUS_Syrovy_commander_desc:0 "§YGeneral Description\nBorn:§! §gJanuray 24, 1888, in Trebitsch, Kingdom of Bohemia, Habsburg Empire§!\n§YMilitary Career:§! Joined the Imperial Russian Army in 1914 as the Weltkrieg began. During the war became the leading general of the Czechoslovakian Corps, and was he who gave the order for their uprising in Siberia. During the war he was an essential leader of the Corps and played a pivotal role in their heroic struggle in the Siberian taiga. After the war his leadership ensured that the Legions stayed united even after the official disbandment. Now as the legions lie in waiting to restart the armed struggle agaisnt the Habsburgs general Syrovy is a major player in the Czechoslovakian National Council and works tirelesly to maintain the legions prepared and trained to free their motherland."
RUS_Gajda:0 "Radola Gajda"
RUS_Gajda_commander_desc:0 "§YGeneral Description\nBorn:§! §gFeburary 14, 1892, in Kotor, Kingdom of Daltamia, Habsburg Empirec §gJoined the Imperial and Royal army in 1914 and immediately switched sides after being captured in 1915 by the Montengrin army. With the defeat and exodus of the Serbian and Montengrin army Gajda ended up in a Serbian Battalion in Russia. Afer the disbandment of this Battalion Gajda joind the Czechoslavk forces and rose up quickly through the ranks. After the Bolshevik Putsch Gajda was instrumental on organizing the Cezch seizure of the Trans-Siberian raillway and was instrumental in the capture of Ekaterinburg and Perm. Invited by Kolchack he oficialy joined the All-Russian army in 1919 and participated in the subsquente battle for Ufa. After the Civil War Gajda resigned his comission in the army and used his contacts and fame to help the Czechslovak emigre community. As the 1930s progress Gajda is instrumental to the organization of the Czech emigre "scouting clubs" and their "scouting manouvers". As the emigres organize their shadow army Gajda is now preparing to take the Czechs to battle for the liberation of their homeland"
russiaRUSF.1213.desc:0 "With the victory of Russian arms the Czechoslovakian Legion has finally come home. With the Habsburgs destroyed the Legionnaires have a new mission, build a new Czechoslovakian army to be the bulwark of the new order in Central Europe."
russiaRUSF.1213.title:0 "The Legionnaires return home"
russiaRUSF.1213.a:0 "A well deserved rest"
russiaRUSF.1427.d:0 "As the russians have restored their monarchy the Czechoslovak movement has been also effected by the wave of anti-republicanism in the country. As Republics worldwide have proven their instability and inability to mobilize their people against Savinkovism and Bolshevism the question of government form has been ignited in the Czechoslovakian movement. Republicans by necessity, as all of the rulers of Bohemia are Habsburgs since the 1500s, the Czechoslavakians dont have a natural candidate for a monarch. However with the restoration of house Romanov there is the opportunity to elect one as King of the Czechoslovakians. Both a opportunity to ride the new monarchical political wave in Russia and a way to solidify the alliance with them the Czechoslovakian emigres organized a congress to discuss their political future. Most observers are predicting that even with the wave of monarchism the Czechs will still maintam the republican course as liberal politicians in the vain of Masaryk still control the congress, however, if certain patrons with deep pockets and connections, sweeten the deal for a Kindgom the congress can be convinced to elect a Romanov for a constitutional Monarchy."
russiaRUSF.1428.a:0 "Have Dmitry mobilize his allies to elect a Romanov"
russiaRUSF.1428.b:0 "Let the Congress run its course"
russiaRUSF.1429.d:0 "As per our promisses the Czechoslavakians will be granted their country, with Maria Romanov as their Queen"
russiaRUSF.1456.d:0 "As our war with the Habsburgs start the Czechoslovakian National Committe has announced the mobilization of a new Czechoslavakian Army in Exile and the stablishment of a Czechoslovak National Government, for now only recognized by ourselves. Ever since the end of the civil war the Czech emigres have maintained paramilitary organizations in our country and now with open hostilities with the Habsburgs they can finally mobilize their army in the open field to help us in the fight against their occupiers."
#Uruguay event
russiaRUSF.1215.desc:0 "With the Russian sphere now having a foothold in South America Chairmann Minister Solonevich has decided to visit the swtizerland of the south. Embarking on a official visit Solonevich was enamored with the city of Montevideo and had productive talks with the gouvernemt about investments and stablishment of a Russian naval base in the region"
russiaRUSF.1215.a:0 "May our friendship last forever"
#Eastern Deluge
russiaRUSF.1214.desc:0 "The Levant crisis is continuing with no end in sight, with the middle easte in incessant warfare the Christian populations are continuing to suffer. Russia has been the traditional protector of the Eastern Christendom and has a duty to intervene and bring stability back to the region. The endless war between the Ottomans and the Arabs opens a window of opportunity not seen in almost a Millenium, with both armies exhausted the Russian Army will bring order to the region in no time and secure our acess to the mediterranean"
#Rus generals
RUS_Bulak:0 "Stanisław Bułak-Bałachowicz"
RUS_Bulak_desc:0 "§YGeneral Description\nBorn:§! §gFebruary 10, 1883, in Meyshty, Kovno Governorate, Russian Empire§!\n§YMilitary Career:§! §gAJoining the Russian Army in 1914 Bałachowicz soon proved to be a superb commander of mounted troops, and commanded a Cossack partisan squadron in the Northern Front. After the collapse of the army and the treaty of Brest-Litovsk he firstly obeyed the Bolshevik Gouvernment but soon defected Yudenich's army. Instrumental to the taking of Pskov he was soon known as the "Ataman", since his troops were mostly cavalry. After falling out with Yudenich he defected to the nascent White Ruthenian Army, breaking with the wider white movement, and helped the Ruthenians drive the bolsheviks out of Ruthenia. However during the interwar years he has become one of the few influential voices who defends cooperation with Russia and the return of Ruthenia to the "Russian World". With the fall of Minsk he has offered his service to the Russians in exchange for promisses of Ruthenian autonomy within the country and is now in a position to gain governorship of Ruthenia after the war."
RUS_ivan_romanovsky:0 "Ivan Romanovsky"
RUS_abram_dragomirov:0 "Abram Dragomirov"
RUS_ivan_romanovsky_commander_desc:0 "§YGeneral Description\nBorn:§! §gApril 28th, 1877, in Luhansk, Yekaterinoslav Governorate, Russian Empire§!\n§YMilitary Career:§! §gAn artillerist by heritage and by education, Ivan Romanovsky was a veteran of the Russo-Japanese War and a respected division commander in the Weltkrieg when the 1917 revolutions began. Loyal to Lavr Kornilov, he joined the Volunteer Army in the Don and became a commanding officer in the high command. This is where he gained the nickname of the "Bad Luck General". Though a talented commander, he was blunt, sharp and never minced his words, shooting down ideas he thought unacceptable and berating those who proposed them in the general staff, which meant that he ended up hated by most officers in the army corps except for Denikin and Kornilov. After the Civil War his undiplomatic character meant that he's been delayed in promotions, but as a close friend and ally of Denikin his fortunes are bound to turn if Denikin's ideas gain tract in the army. Even though undiplomatic his talent in warfare cannot be mistaken - he is a capable artillery commander and an expert in firepower concentration, turning him into a important figure in the "Neo-Suvorovian clique"."
RUS_abram_dragomirov_commander_desc:0 "§YGeneral Description\nBorn:§! §gApril 21th, 1868, in Chernihiv, Chernihiv Governorate, Russian Empire§!\n§YMilitary Career:§! §gAn officer by heritage, Abram Dragomirov graduated from the Academy of the General Staff in 1893 and joined the elite Semenovskii Life Guards Regiment. Starting the Weltkrieg commading a cavalry brigade Dragomirov got sucessive promotions and by 1917 was appointed commander of the Northen Front by the Provisional Government, however, he resigned his position a month later to protest the breakdown in discipline in the army. After the Bolshevik Putsch he was one the first officers who joined Alekseev and Kornilov in the Don. Dragomirov became assistant commander to Alekseev and after his death was designated chairman of the "Special Council" and oversaw the white adminstration on the Don, while also being a assistant general on Kornilov's staff. After the Civil War Dragomirov is now instrumental on the organizational reforms of the Russian Army, being one of the few figures who is a a respected friend of both Wrangel and Denikin, Dragomirov calm and collected demeanor has helped to keep this conflict in check. As a calvary officer he is a somewhat enthusiastic about the "Black Epaulettes clique" but he is still unsure about the role of the tank in a modern battlefield"
russiaRUSF.1474.d:0 "As Wrangel is promoted to Chief of the army he has decided to promote his right hand man, Pavel Shatilov, to the rank of General-Feldmarhsal. An solid infantry commander and superb inteligence officer, shatilov's promotion has strenghten the position of inteligence, and schooling in counterinsurgency tactics, in the Russian Army. Wrangel and Shatilov hope that a reinvigorated spirit and superb inteligence will enable the Russian Army to compensate for its weaknesses in industrial output."
russiaRUSF.1475.d:0 "As Denikin is promoted to Chief of the Army he has decided to promote his right hand man, Ivan Romanovsky, to the rank of General-Feldmarshal. Romanovsky, an solid commander and artillerist, is one of the greatest military minds in Russia, even though an undiplomatic character. The promotion of Romanovsky has solidified the dominance of the "Neo-Suvorovian" clique in the military, and together with Golovin, he is already expanding the role, and size, of artillery in the Russian military doctrine. Denikin and Romanovsky hope that with greater standardisation and focus on artillery the Russian army can compensate for its weaknesses in industrial output."
#Rus Mannerheim - Grand Duchy
GDF_carl_gustaf_mannerheim_desc:0 "§YGeneral Description\nBorn:§! §gApril 21th, 1867, Askainen, Grand Duchy of Finland, Russian Empire§!\n§YMilitary Career:§! §g Now as the Russian Army has occupied Finland the Czar has restored the old Grand Duchy of Finland, and for his loalty to his uncle, he appointed Mannerheim as the new Duke of a sovereign, but vassal, Duchy. Mannerheim is now tasked with bridging the distrut between Finns and Russians and rebuild Finland into a equal partner of Russia."
RUS_carl_gustaf_mannerheim:0 "Carl Gustaf Mannerheim"
RUS_carl_gustaf_mannerheim_desc:0 "§YGeneral Description\nBorn:§! §gApril 21th, 1867, Askainen, Grand Duchy of Finland, Russian Empire§!\n§YMilitary Career:§! §g Serving in the Russian Army since 1891 Mannerheim joined the Cavalier Guard Regiment in Saint Petersburg, in he Russo-Japanese war he asked to be transfered to the front and was promoted to colonel for his brave and efective actions against the japanese. After the defeat he was tasked personally by the general staff to undergo a secret mission in Central Asia and China. His adventures ended in Tibet and he became one of three europeans who had ever met a Dalai Lama at that point. In the Weltkrieg he was promoted to Liutenant General of the 6th Cavalry Corps. After the february revolution Mannerheim was considered too reactionary by the new government and was forcefully retired. After returning to Finalnd Mannerheim took an active part in the creation of the Finnish White Guard with german support, and lead them to victory in the finnish civil war. After the weltkrieg he remained an influential figure in finland, one of the few figures that was against the german puppet monarchy in the country, and preached that Finland should keep god relations with Russia. Mannerheim always considered himself loyal to his monarch, and even kept a portrait of Nikolay II in his office. Now with the fall of Finland to the Reds Mannerheim has ended his retirement, renewd his oath, and stands ready to serve the Tsar."
russiaRUSF.1221.a:0 "Mannerheim was always loyal to the Tsar (Mannerheim becomes available)"
russiaRUSF.1221.b:0 "Give him a quiet retirement"
russiaRUSF.1221.desc:0 "After the Finnish White Guards were defeated by the Finnish Reds a lot of their members fleed into the Russo-Finnish frontier. One of those emigres is the famous commander Carl Gustav Mannerheim. Mannerheim has a complex history with the Russian Monarchy. Even tough he served admirably his monarch, Nikolay II, after the revolution he ended up leading the German puppet white army of Finland. Defeating the Finnish Reds he retired to his estate after pressure from Germany. Mannerheim was one of the few Finnish figures who campaigned for a Finnish-White alliance during the civil war and after the civil war he campaigned for Finnish reaproachmant with Russia. Now with Finland in Red hands Mannerheim has returned to Russia. His impecable monarchist stance in the days of the revolution, and his stance on Finnish-Russo friendship, managed to get him a audience with Czar Kyrill. In this audience Mannerheim renewed his oath to the Russian Monarchy and asked to serve once again in the Czar's Army"
russiaRUSF.1223.desc:0 "As the Czar`s army marches on Helsinki the future of the Finnish nation is in question. Some members of the cabinet see the re-annexation of Finland as a waste of time and resources, and want to install a republican government aligned politicaly and economicaly with us. However some members of the military have come up with a strange scheme, the idea of reinstainting the Grand Duchy of Finland, with a friendly and loyal Duke, and vassal of the Czar. While sort of medieval this idea has come to the attention of the Czar and seems a viable option to secure the northen flank of Petrograd while giving the Finn`s enough autonomy to keep them happy and pacified. 3 options have come up to who would be the new Duke of Finland. First it woud be to reinstate a Romanov as a grand Duke, using the opportunity to teach young Vladimir about administration, and have an elected prime minister in charge of most of the countrie's affairs. This option while giving us more direct controll, as the Czar himself could veto finnish policies, would not endear us to the local population. The second option is to install a local figure as grand duke. The first candidate is Carl Gustav Mannerheim a Romanov loyalist, but apolitical in any other matters, and finnish national hero to the post of Grand Duke. The second option is Paul Von Gerich a staunchly right-wing figure, which would help entrentch conservative politics in Finland. The third option would be to install a more civilian figure, Ernst Von Born a noble from a solidified, and mostly loyal, line. Von Born has already served under the old Duchy's administration, being Helsinki police mayor in 1913, and is the one of the most prestigious legal minds in Finland, making him a solid choice for the position."
RUSF_ReleaseGDF:0 "Recreate the Grand Duchy of Finland"
russiaRUSF.1455.d:0 "When Finland was taken by Syndicalism the regime in Paris wasnt much excited by the prospect of having to reinforce a ally so far away into the Baltic Sea. With the conclusion of our economic deal with the Internationale a secret clause was added to solve the Finnish question. With Finland being of extreme importance to our defense, while for the French they represent a far away comitment, our diplomats have organized a "exchange". We have agreed to abstain from any involvements in helping the right-wing organizations in the forming Spanish powderkeg, while the French will look the other way when we march into Finland."
GDF_Factories:0 "Soldiers Millions"
GDF_Factories_desc:0 "With the reestablishment of the Grand Duchy of Finland the old army restrictions from 1901 were also reinstated. Finland will not have its own armed forces, being permited only a volunteer gendarmie equiped with light weapons. In acordance to the same laws Finland will also not have any type of military conscription, paying a tax to finance the Russian Military garrisons in the country. Finns, however, will be permitted to voluntarily serve in the reinstated Finnish Guards divisions. Because of this the nascent Finnish military-industrial complex, born after the Civil War, has been integrated into general All-Russian military procurement."
FIN_locked_divisions_idea_tt:0 "Finland has been exempt from Imperial Conscription, instead it pays a special tax for the maintanance of the All-Russian Army"
RUS_Find_Finns:0 "Finding Finnish volunteers"
RUS_Find_Finns_desc:0 "While finns are exempt from military conscription we still need to find a way to tap into some of the manpower of the country for our armed forces. To do this we have send army, navy and airforce recruiters to Finland to find anyone willing to fight for our cause. Prisioners are being offered pardons for service, generous signing in bonuses, financed by the military millions, have been given and the old "Join the Army, see the world!" speeches are being spoken in schools and colleges around the Grand Duchy. With this effort we hope to recruit at least some Finns to our ranks"
russiaRUSF.1483.d:0 "Between 1809 and 1901 Finnish administration was organized as a largely independant Grand Duchy, which was targeted by centralization measures at the start of Nikolay's II reign. The centralization and russification efforts proved an abysmal failure and lead to great unrest in the once pacific Duchy during the Weltkrieg. Before 1901 Finland had its own army and civilizan and administration, and while we have reinstated the latter the question of the former is still open. While some of our army wants to implement direct conscription of Finns in the All-Russian army, the Grand Duke [FIN.GetLeader] has managed to stave this effort off as it would generate major unrest in the Duchy. He proposes the creation of a national Finnish army, with its own command that can act in concert with the All-Russian army in any future war, however the STAVKA is greatly worried about the maitanance of an once independant army outsied its command structure. Another option floated was the reestablishment of the "Soldiers Millions", a special tax payed by Finland between 1901 and 1917 that made it exempt from national conscription. If reinstated it will make Finland unable to have any armed forces, besides lightly equipped national gendarmies for policing duties. While not a perfect solution the reinstaintment of the millions will make Finland contribute to the defense of the Empire without either creating massive unrest, or worriyng the STAVKA."
russiaRUSF.1484.d:0 "While we have disbanded the Finnish army, and most of its soldiers returned home, some veterans of the white finnish movement and the finnish national army have volunteered into the new Finliandsky Leib-Gvardii Diviziya. Drawing its history from the Finnish Royal Guards Rifle Battalion, most famous for its participation in the storming of the Fortress of Gornij-Dubnjak, during the 1877-1878 Russo-Turkish war, this enlarged formation was created by the government in hopes to entice finnish voluntary service in the All-Russian Army, and as a symbol of the new ideological aligment of the Russian regime in Finland, summarized in the new propaganda slogan "Free Finland in Free Russia"."
FIN_Vladimir_III:0 "Vladimir Romanov"
FIN_Vladimir_III_desc:0 "Vladimir, but in Finland"
FIN_ernst_von_born:0 "Ernst Von Born"
FIN_ernst_von_born_desc:0 "§YGeneral Description\nBorn:§! §gAugust 24th, 1885, Perna, Grand Duchy of Finland, Russian Empire§!\n§YCareer:§! §g Baron Ernst Von Born is the son of Viktor Magnus von Born, a important figure in the Grand Duchy of Finland politics in the 19th century. He graduated Helsinki university in 1909 and practiced law at the Turku Court until 1913. In the same year he was appointed police mayor of Helsinki, and was convicted to three months in Kresty Prison in 1915 for fighting russification policies. During the interwar years he was a important figure in Finland, fighting against the Lapua Movement in parliament and the interior ministry."
RUS_Recruit_Finns1:0 "Recruitment 1st Finnish Division"
RUS_Recruit_Finns2:0 "Recruitment 2nd Finnish Division"
RUS_Recruit_Finns3:0 "Recruitment 3rd Finnish Division"
RUS_Recruit_Finns4:0 "Recruitment 4th   Finnish Division"
#Rus mediteranean 
russiaRUSF.1217.desc:0 "With the vanquishing of the Ottomans, Grand Admiral Kolchack now looks at the shores of the Mediteranean with a new determination. After hundreds of years of being caged in the Black Sea the Russian Fleet now finally has control of the stratis and the possibilites are seemingly endless. As the Grand Admiral looks at the warm mediteranean his mind is already full of new plans and building programs, of new fleets and bases, and of a navy worthy of a world power."
russiaRUSF.1217.a:0 "With the breaking of the straits the Russian Navy is finaly free to sail the seven seas"
#Rus capital
russiaRUSF.1218.desc:0 "With the Finnish straits secure a new debate rages in the halls of power. Petrograd, the city of Peter the Great, was our capital for almost 200 years before the Bolshevik Putsch. After the fall of the Provisional Government and Finnish independence the Bolsheviks moved the capital to Moscow, a safer position now that the Finns were a German puppet in all but name. With the end of the civil war Admiral Kolchack mainatened this decision, and the Russian political and military life reorganized itself around Moscow. However now with the land and naval approaches to Petrograd secured the debate about the capital is reignited, should we return to the City of Pyotr Velikiy and affirm our repositioning as a world power with a change of capital to a forward position? Or should we keep our government in the safer strategic position in far away Moscow."
russiaRUSF.1218.a:0 "let's move the capital back to the city of Pyotr Velikiy"
russiaRUSF.1218.b:0 "Moscow's central position, and distance to the borders, is our greatest strenght"
#Rus Second Rome
russiaRUSF.1219.desc:0 ""So know, pious king, that all the Christian kingdoms came to an end and came together in a single kingdom of yours, two Romes have fallen, the third stands, and there will be no fourth". Wrote Philotheus of Pskov to Grand Duke Vasily, almost 100 years after the fall of the City of the World's Desire. The prophecy given as both a warning and a privilege has made the Russian Czars the bearer's and defenders of true Orthodox Christendom. Today, however, Philotheus soul can rest a little easier. As the troops of the Czardom pass the Theodosian Walls and the Golden Horn racing to secure the Hagia Sophia the 400 years old occupation of the Second Rome by the heathen's is lifted. Today bells ring in all churches in Russia and the picture of Russian troops in the Hagia Sophia is first page in all newspappers. The Patriarch of Konstantinopol has already made arrangements to convert Hagia Sophia back into a Christan Church and is only waiting Czar's Vladimir arrival to make the cerimony. With the capture of the City of Cities the Russian people feel invincible."
russiaRUSF.1219.a:0 "We will protect the Second Rome ourselves"
russiaRUSF.1219.b:0 "Let our Greek brethren protect the city of their forefathers"
russiaRUSF.1222.desc:0 "Now with Constantinople secured the Czar has accepted the invite of the Patriach to the reconsecration of Hagia Sophia. As his ship anchored, Vladimir looked upon the Golden Horn and the towering Hagia Sophia, the places his ancestor longed to conquer for hundreds of years. As his motorcade approached the Hagia Sophia Vladimir received an enthusiastic reception by his troops and the Christian population of the city. After witnessing the first Orthodox Service after almost 400 years of Muslim occupation Vladimir gave a speech in the church entrance. To alleviate the fears of the Muslim majority population Vladimir promissed to respect their right of free worship and Muslim built religious sites, alleviating rumors that Russian troops were preparing to demolish the Blue Mosque and other Muslim landmarks. In his speech the Emperor presented himself as the leader of a empire that has many Muslim`s subjects, and that he considers himself the protector of all faiths, promissing that under his rule Konstantinopol would be once again the "City of the World's Desire". After the speech the Czar went to a meeting with the important religious figures of the city trying to mediate disputes about religious sites and renovation of Christian monuments that were replaced by Muslim ones. After he got back to the capital he was received by a thunderous demonstration by his subjects with some more vigorous monarchist`s using the title "Vladimir Velikiy". With the conquest of Constantinople Vladimir has proven that a Russian Czar, raised high be his people, was indeed invincible."
russiaRUSF.1222.a:0 "The defenders of Monarchy are proven right by history"
#Russians in Prague
russiaRUSFN.3.d:0 "As the Russian armies advance pass the banks of the Vitava River the ancient city of Prague has capitulated. Prague, one of the grand capitals of Europe, was captured from the Habsburg domain by the Czechoslavakian Corps of the All-Russian Army. The dreamt capital of Czechoslavkia is now the seat of a Czechoslovakian Provisional Government. The population received their returning countrymen, and their gallant russian allies with the greatest jubilation. With the loss of Prague and the Bohemian heartland the Habsburgs are now firmly on the retreat, trying to desperatly hold the way to Vienna against the russian onslaught."
#Baroness Sofia de Bode
russiaRUSF.1225.desc:0 "During the Weltkrieg the provisional government raised women's battalions of death to improve morale after the 1917 disasters, and to shame the man into going back to the fighting. After the bolshevist took power they disbanded the battalions, as they were politicaly unreliable and loyal to the provisional government. After that most of its officers were forced to retire by the bolshevists or went to battle defending the provisional government in the winter palace and the fighting in Moscow. However some of them made their way to the Don to join Kornilov and Aleeksev. One of those woman was Baroness Sofia de Bode, daughter of the General Baron Nikolai de Bode. During the civil war her popularity and stories of heroism, and brutal treatment of bolshevists, who killed her mother and sister in 1917, made her well knwon in all Russia. After the war Sofia was discharged from the army and used her influence to create a charity for the veterans of the Womans Battalions of Death. A monarchist at heart she was delighted with the restoration of the throne and asked for an audience with the young Tsar. In the audience she said that war with Germany is inevitably coming, and asked for a reinstatment in the army to help fight the old enemy. With her experience and heroism Sofia de Bode would be hallfway to Field Marshall by now and is experienced enough to lead Russian Armies on the Field. However her fame from the civil war would also be usefull to drive recruitment numbers, and already the propaganda department of the army is interested in having her tour the country. reinstatement of the Federal government in Alaskan soil. The commite leand by general Einsenhower  in a command position is clearly her preffered option, but would be controversial within the army, while the second option would be more acceptable to the high command."
russiaRUSF.1225.a:0 "Give this Womam a horse and a saber. (Sofia becomes available)"
russiaRUSF.1225.b:0 "Put our heart's on fire, Baroness"
RUS_sofia_bode:0 "Sofia de Bode"
RUS_sofia_bode_desc:0 "§YGeneral Description\nBorn:§! §gFebruary 27th, 1896, in Simbirsk, Ekaterinodar Governorate, Russian Empire§!\n§YMilitary Career:§! §g Sofia graduated from the Smolny institute of Noble Maidens, the most prestigious school for woman in the Empire. She secretly joined her father in the army in 1914 and serve 8 months in his intelligence department, she broke her leg somewhere around that time and was sent back to Moscow. After the fall of the Tsar she enrolled in the first Women's Death Battalion , one of the first 25 to do so. During the bolshevik coup in 1917 she was again wounded after taking command of a junker detachment, after a lul in the figthing she fled to the Don and joined Kornilov, taking part on the ice march. Brutal towards bolshevik comissars, executing them on the spot, and known by her boundless courage she became a famous figure on the Volunteer Army. After almost diyng in the storming of Ekaterinodar she spent some months away from the front and only returned to serve in the campaign towards Moscow. She made her fame in the country as a dashing cavalry woman, with such grace and brutality was dubbed as the "White Valkyrie". After the civil war Sofia helped ther father with setting charitys and fundraisings to invalid soliders, men and woman, of the Weltkrieg and the Civil War. However now with the blessing of the Tsar the "White Valkyrie" is once again in the saddle, and with saber in hand she is prepared to bring death to the enemies of the Motherland."
baroness_on_fire:0 "The Baroness has done her duty, and you?"
baroness_on_fire_desc:0 "The campaign of Baroness de Bode is a great success. With newspapper articles, posters and public events the Baroness has raised a lot of recruits for the army, and directed some major donations to the veteran's cause. Overall the army is delighted with the propaganda results."
russiaRUSF.1400.d:0 "As the war rages Baroness de Bode has showed her incredible prowess leading our men into battle, as her men go from victory to victory a petition with thousands of signatures has reached the desk of the Czar. The men under her are suplicating to the Tsar to make the army recognize her great achivements and giver her a promotion of the rank of Marshal. Any men with a service record half as glorious as the Baroness would already have received this rank by now, they argue, but the army leadership has refused to give any more promotions to their dear "Baroness of Victory" for the fact that she is a woman. As the Czar and Marshal Wrangel meet to discuss it, the Czar learns that Wrangel is not so much against the ideia, and see how the exploits of the Baroness have already made major impacts on Russian morale, however conservative army elements are vehemently against the ideia of a "Marshaless of Russia". Now the Czar is at a crossroads. Does he make the decision to promote her himself, at a political cost, or he gives in to the old guard demands"
#Baroness Movie
russiaRUSF.1227.desc:0 "As the Baronesse's fame fame reaches new heights the army has decided to bankroll a movie about her exploits in the civil war. Being one of the greatests productions in Russian Cinema, after Aleksander Nevsky, the film has been greatly received on Russian cinemas and great queues are seen before sessions. The film follows the Baroness from her first joining of the army in 1915 to her exploits in the siege of Moscow. The Baroness, assisting in the production, has changed the script several times to give more emphasis to the role of women in the Volunteer Army and the White Movement, bringing a lot of veterans to the film set. The success of the movie has made the question of Women enlistment surfaces once again in the russian military sphere." 
russiaRUSF.1227.a:0 "After what this Woman said to us, we can't live, fix bayonets! charge!"
#city of the worlds desire
city_of_the_worlds_desire_desc:0 "The city of Constantine, the Christian capital of Rome, the City of the Worlds Desire, seat of one of the most important Patriarchs and the Queen of the Hellespont. The capture of the city is a great prestige boost to our cause. With its conquest Russia is finaly free of the shackles of the Dardenelles and will open a new era of economic development and trade in the Black Sea."
city_of_the_worlds_desire:0 "The City of the Worlds Desire"
#Rus East Prussia
russiaRUSF.1229.desc:0 "With the occupation of Koningsberg the upper baltic is now firmly in Russian hands. While some ministers are planning to use the city as a base for a East Prussian State separated from Germany. However Grand Admiral Kolchack has defended the need to annex the territory directly, to make sure that the north Baltic is firmly under our control."
russiaRUSF.1229.a:0 "Annex East Prussia and rename Koningsgerg to "Tsargrad na Baltike"
russiaRUSF.1229.b:0 "Aneex East Prussia and rename Koningsberg to "Vladimirograd" in honor to the Czar"
russiaRUSF.1229.c:0 "Annex East Prussia and rename Koningsberg to "Kirillograd" in honor of the late Czar"
russiaRUSF.1229.d:0 "The East Prussian territory is better of as a protectorate than a Gubernia"
russiaRUSFN.2.d:0 "As the war in the East continues, today the Russians have announced a great victory. The Stavka has released to the international press the first news and pictures of the battle of Koningsberg. The russian high command has decried the battle as the "avenging of Tannenberg" and is calling the German Empire to abandon it's eastern posessions and capitulate to Russian demands. The German Imperial army has released a press bulleting calling the defeat a temporary setback, and saying that the force of Prussian armns will soon retake the great city, and send the Russians back to their borders. International comentators are saying that the fall of Koningsberg marks the end of the German Weltpolitk."
VICTORY_POINTS_6332_KALEDINGRAD:0 "Kaledingrad"
VICTORY_POINTS_6332_Vladimr:0 "Vladimorograd"
VICTORY_POINTS_6332_Tsargrad:0 "Tsargrad na Baltike"
VICTORY_POINTS_6332_Kirill:0 "Kirillograd"
#Holy Land
russiaRUSFN.1.d:0 "As the Russian armies enter Jerusalem the balance of power is forever changed in the Middle East. With the capture of the Holiest of Cities the Russian Empire has reached the Zenith of its power and prestige. As the Russians are preparing a grand celebration, with the presence of the Czar himself, for the reconquest of the city for Orthodoxy. As the russian armies parade in front of the Church of the Holy Sepulchre, the militaries of Europe look worriedly at their maps. With the capture of Jerusalem the Russian Empire is less than 300 kilometers of the Suez Canal and it's poised to cut Germany's connection to Asia." 
HLA_Timotheus:0 "Timotheus I"
HLA_Timotheus_desc:0 "§YGeneral Description\nBorn:§! §gSeptember 22nd, 1878, Samos, Ottoman Empire§!\n§YEcclesiastical Career:§! §gTimotheus Themelis was born in the island of Samos, in the Ottoman Empire, to a family of Greek Orthodox Christians. He completed his secondary education on the island and was brought to Jerusalem under de patronage of Patriarch Damian. After Damian's death in 1931 Timotheus was recognized as the new Patriarch of the Orthodox Church in Palestine. With the Russian occupation of Palestine Timotheus has been chosen by the Czar to be the new administrator of the Holy Land Protectorate. As the conflict between Jews and Arabs intensified during the Levant Crisis it is hoped that a adminstration primarily headed by the neutral christians can mantain the peace between Zionists and Arabs and protect the Holy Sites of all relgions." 
HLA_Council_desc:0 "The Inter-Religiou of Jerusalem and the Holy Land is a new institution created by the Russians to administer the Holy Land Protectorate. The council is composed by the Patriarch of Jerusalem, representing all Christians in the region, the Grand Mufti of Jerusalem, representing the Muslim community, and the Chief Rabbi of Jerusalem, representing the Jewish community. The council is tasked with maintaining peace in the Holy Land and protecting the Holy Sites of all three religions. The council will also be responsible for the day to day administration and the settling of disputes between the three communities."
HLA_Levitov_desc:0 "§YBorn:§! §LOctober 12th, 1893, in Golovinshchino, Ryazan Governorate, Russian Empire§!\n§YBackground:§! §LMikhail Nikolayevich Levitov, despite his descent from an old line of clergy, chose to abandon his theological studies in 1914 and enlisted in the Vilno Military School, from which he graduated on an expedited course. Entering the Great War in 1915 as a junior officer of the 178th Venden Infantry Regiment, he earned two decorations for merit and the rank of poruchik by the war's end.\n\nWith the start of the Civil War, Levitov travelled to the Don and enlisted with the Volunteer Army, finding himself in the ranks of the 1st Assault Regiment (also unofficially known as the 'Kornilovites'), though not before serving a brief stint in the partisan squad of Colonel Simanovsky. A participant of the gruelling Ice March, Levitov served much of the Civil War in the 2nd Assault Division, where he eventually attained the rank of deputy commander. Levitov was among the first soldiers who entered Moscow upon the establishment of General Vitkovky's bridgehead, and he later participated in the Northern Offensive to Arkhangelsk.\n\nDespite concluding the Civil War as a stabs-captain, Levitov's merit was noted and he was promoted to the rank of subcolonel. He continued his service in the new Guards units, slowly moving up the ranks until his most recent promotion to general-major in 1936. Now entrusted with the administration of the Holy Land Protectorate, Levitov is expected to use his experience with the clergy and the church to maintan the peace between Christians, Jews and Arabs and to start the reconstruction of the region."
HLA_Council:0 "The Inter-Religious Council of Jerusalem and The Holy Land"
HLA_Levitov:0 "Mikhail Levitov"
HLA_Zionism_desc:0 "The Zionist movement has been a question of contention in the Holy Land for decades now, With the destruction caused by the Levant Crisis and the creation of sectarian militias by the Ottomans and Egyptians the question of settlement and land righst grows more violent by the day and sectarian violence is on the rise. While the Jews want to settle in the Holy Land and create their own state, the arabs want not to be ruled by foreigners, and with both sides heavily armed, the conflict is boiling."
HLA_Zionism:0 "The Zionist Movement"
HLA_Arab_Resistance_desc:0 "As our armies occupy the Holy Land the Arab population is not happy with the new occupiers. With the Ottomans gone and the Egyptians in disarray the Arabs are left to fend for themselves. With the Zionist movement growing in strength, after Arab and Ottoman defeat, the Arab population and their militias are waiting to see if the new occupiers will make any move to against the local Muslim majority, all the while already clashing with the Zionist militias."
HLA_Arab_Resistance:0 "The Arab Resistance Movement"
HLA_Foreign_Police:0 "The All-Russian Army Garrison"
HLA_Foreign_Police_desc:0 "With the occupation of the Holy Land the Imperial Russian Army has been tasked with maintaining order in the region. While the tensions between Arabs and Jews are boiling to extremes the christian minorities in the region seem to be the only ones to receive the Russian occupation as good news and are cooperating with the new authorities. With the creation of the Holy Land Protectorate the Russian Army is tasked with maintaining law and order while facing increasing atacks by the sectarian militias."
HLA_Budha:0 "Budhist Policeman"
HLA_Budha_desc:0 "General's Levitov's plan seens to be working. Now with religiously neutral Budhist's patrolling the streets of Jerusalem the sectarian tensions are getting under controll. Without any of the sides being able to accuse the policeman of favoring one religion or another, militia violence agaisnt our troops is getting more manageable. However there is still work to be done to maintan the peace and disarm everyone."
HLA_Desctruction:0 "A land in ruins"
HLA_Desctruction_desc:0 "The Holy Land has been devastated by the Levant Crisis and our invasion. With the destruction of the status quo the region, with its already meager infrastructure, lies in ruins. With the creation of a new administration our greatest priority is to rebuild infrastructure and develop means for future prosperity in the new state."
HLA_Desctruction2:0 "A land in ruins"
HLA_Desctruction2_desc:0 "The Holy Land has been devastated by the Levant Crisis and our invasion. With the destruction of the status quo the region, with its already meager infrastructure, lies in ruins. With the creation of a new administration our greatest priority is to rebuild infrastructure and develop means for future prosperity in the new state."
HLA_Comitments:0 "Creating a new state is not a cheap endeavor, general Levitov's adminstration has required considerable funds to reestablish peace in the Holy Land"
russiaRUSF.1230.desc:0 "With the occupation of the Holy Land our gouvernment now finds itself in the position of having to decide what to do with the region. As Zionists, Arabs and Ottoman Loyalist's clashed during the Levant Crisis, and even now some of their militias are still atacking our troops and each other, the region is in chaos. Now we have two options to stabilize the region, the first one is to insert the province in a new greater regional gouvernment and the second to release the Holy Land as a separete gouvernment. The second option would be beneficial as creating smaller states would make our control of the Middle East more secured and weaken our new clients, but it demands a more direct intervention on our part to stabilize the chaos between the many factions and religions."
russiaRUSF.1230.a:0 "We will create a new protectorate to administer the region headed, temporarely, by general Levitov" 
russiaRUSF.1230.b:0 "Our garrison's are already stretched thin, hand it to a regional government."
russiaRUSF.1231.desc:0 "The creation of a protectorate in the Middle East is not a easy task, and general Levitov's adminstration is in dire need of money, so to this end the central bank of Russia has opened a line of credit to the new state."
russiaRUSF.1231.a:0 "Well, those are the costs of creating partners"
#ASY - puppet 
russiaRUSF.1232.desc:0 "After the occupation of lower Mesopotamia our governmet was approached by the Christian Assyrians looking to create a state for their people. With the end of the Weltkrieg the Assyrians were abandoned by the Entente and relocated to Basra, far away from their original homeland. While the Levant Crisis raged the Assyrians isolated themselves in their communities fearing that any of the winners would still be agressive towards them. However now with a Christian power occupying the region the Assyrians are throwing all their weight to gain our support for their national aspirations."
russiaRUSF.1232.a:0 "A new Christian partner, controlling the Gulf. A great opportunity."
russiaRUSF.1232.b:0 "Let insert the Assyrians into a new greater regional partner."
#Bulak
russiaRUSF.1401.desc:0 "As our armies advance into Minsk the famous general Bulak-Balachowicz and his allies have offered their services to the All-Russian Army. The general, one of the few Russophiles in Ruthenian politics, is offering the services of his man and political allies in exchange for promisses of autonomy for Ruthenia in wider Russia. As one of the most famous figures in the country his help would be invaluable to pacify the country and his experience in the battlefield would be a great adition to our armies."
#Dutov
russiaRUSF.1402.desc:0 "With the fall of the SZRS and the restoration of a rational monarchical government Cossack politics are in disaray. As divided as national politics before the assassination of Chernov, 2 great leaders had emerged in the political arena. Krasnov's reactionaries aligned with the SZRS and Dutov's republicans aligned with the Kadet opposition. In 1929 Krasnov appeared to have secured his position with the purge of the more active anti-savinkovist officers in the army and the Hosts. However Dutov's fame as one of the first men to raise arms against bolshevism proved to be too strong. His retirement from the army in 1929 opened the doors for the solidification of his political position in Orenburg. Now, with the fall of Savinkov, Ataman Dutov's posiition has never been stronger, and after his reinstatment in the army, the Ataman is out for blood. As Marshal Wrangel is eager to cleanse the hosts of Savinkov's thugs Dutov has been given carte blanche to purge the Svobodniks from cossack politics."
RUS_Dutov_desc:0 "§YGeneral Description\nBorn:§! §gAugust 17th, 1879, Kazalisnk Syr-Darya Oblast, Russian Empire§!\n§YMilitary Career:§! §gBeing in the military since youth Aleksander Dutov is greately respected among the Cossacks. In the Weltkrieg Dutov served as assistant commander of the 1st Orenburg Cossack Regiment. For his republican politics Dutov rose rapidly after the February revolution and was elected Ataman of the Orenburg Cossack Host. With the fall of the Provisional Government Dutov was one of the first commanders to rise in defense of the the constituent assembly and fight against bolshevism. Greatly respected after the Civil War Dutov aligned himself with Boldyrev and his republican officers against Savinkov's SZRS thugs and serves as a conterweight to Krasnov in Cossack politics. However after the 1929 coup atempt Dutov was forced to retire from the army, but under his leadership the Orenbung Host maintaned its staunch opostion to the SZRS. With his reinstatement in the army after the fall of Savinkov Dutov is out for blood and has been given carte blanche to cleanse the Hosts from Svobodnik influence."
RUS_Dutov:0 "Aleksander Dutov"
russiaRUSF.1403.desc:0 "As the government needs a counterweight to Krasnov's reactionaries in the Cossack Hosts the Ataman of the Orenburg Host, Aleksander Dutov, has been reinstated in the army. Dutov is as republican as a cossack can get and, in his tenure as Ataman of the Orenburg Host. has been a stauch opponent of the SZRS and Savinkov's thugs, and took position as a defender of a lawfull Russia. With his reinstatement we hope to appeal to the less reactionary among the Hosts"
#Manchu
russiaRUSF.1404.desc:0 "bleh"
russiaRUSFN.4.d:0 "As Fengtian armies descent into China Russian armies crossed the Manchurian border advancing in the direction of the Yalu river and Port Arthur. The Japanese reaction was a immediate declaration of war agaisnt the Russians and the ratification of Fengtian membership into the Co-Prosperity Sphere. As the Second Russo-Japanse war starts the future of Asia is at stake. As all of the great powers turn their attention to the Far East, the japanese foreign ministry has declared that "This blatant display of Russian Imperalist aggression will not go unpunished, japan begs that the peoples of Asia flock to the prosperity sphere to defend against western imperialism". While the Russian foreign ministry has declared that "Japanese aggression into China leaved us no choice but to intervene to protect Peking."
RUS_JAP_WAR_desc:0 "As the Internationale and Germanya are poised to initiate hostilities in the west the German High Command will see in our eastern adventure an opportunity to strike us while we are distracted by the japanese. If our adventure in the East draws on too long the Germans will certainly use this opportunity to force us to face their greatest enemy, a war on 2 fronts. We can expect that the germans to pounce the opportunity if we become bogged down in Manchuria, To avoid that the STAVKA has drawn a 90 days offensive operation plan, with the objectives of taking Harbin, Shenyang and Dalian in an effort to immobilize and cut the Manchurian armies in half fast enough to make the Germans reconsider launching an offensive. "
RUS_JAP_WAR:0 "Kordratenko - Harbin axis."
RUS_JAP_WAR2:0 "Kordratenko - Shenyang axis."
RUS_JAP_WAR3:0 "Kordratenko - Dalian axis."
russiaRUSF.1465.d:0 "As Fengtian armies descent into China the Stavka has seen a opportunity to teach Zuolin and his Japanese masters a painfull lesson. With the fall of Beijing and the Fengtian offensive into the Northern China plain the manchurian border is as lightly defended as it will ever be. This is the perfect opportunity to make a swift trike into Manchuria and remove the japanese from mainland Asia. However if we use this opportunity to pounce on Japan our adversaries in the west will certainly take the opportunity to punish us for it if we take too long to force a Japanese surrender."
#Paraguay
russiaRUSF.1405.desc:0 "In 1908 German general Hans-Kundt headed a military mission to Bolivia to reform its army along imperial german lines. As tensions between Paraguay and Bolivia soared in 1929 the German government immediately supported Bolivian claims in the Chaco. Seeing a opportunity to hurt the Germans somewhere Field-Marshal Kornilov concocted a scheme to send a secret military mission to Paraguay. As the purges of 1929 were happening, some of the "purged" officers found their way into Paraguaian employment and helped to quickly modernized and reform its army to european standards. Now as tensions increase between Bolivia and Paraguay, and oursevelves and the Germans, we shall send a new militay mission, this time with officially, to help our friends in the South."
russiaRUSF.1405.a:0 "General Ivan Belayev seens eager to return to Paraguay."
russiaRUSF.1406.desc:0 "As tensions between ourselves and Bolivia start to rise our Russian partners have sent a military mission to modernize our army. The mission headed by general Ivan Belayev has focused on the standardization of equipment and training to prepare our men for defensive operations in the Chaco."
russiaRUSF.1407.desc:0 "As Bolivia deepen its military relationship with the Germans tensions along the Chaco Border started to rise again. As Bolivia and Paraguay have been enemies since the end of the Chaco war its only natural that we invite Paraguay to our alliance."
#Southern Shield
russiaRUSF.1408.desc:0 "As the situation in China deteriorates further we have approache Tibetan leadership to offer than protection. As the various warlod governments dont recognize Tibetan statehood their international situation is precarious and our protection would guarantee their independence from China."
russiaRUSF.1409.desc:0 "Now that we are allied with Tibet the doors to the Himalayans is open to our influence. As the war in India escalate the Kingdom of Nepal is fearfull of a Indian invasion and its open to our influence and protection. With Nepal in our sphere of influence we have secured our hold in the Himalayans and now can excert influence in the Indian subcontinent."
RUS_InviteTib:0 "Invite Tibet to our alliance"
RUS_InviteNep:0 "Invite Nepal to our alliance"
RUSF_InvitePara:0 "Invite Paraguay to our alliance"
RUS_Build_Faction_Railway:0 "Build railways in southern Himalayas"
RUS_BuildAfghanistan:0 "Build infrastructure in Afghanistan"
RUS_BuildAfghanistan_desc:0 "While Afghanistan has been grealy modernized by king Amanullah the country still has backwards military infrastructure, specially with only two airports in Kabul and Peshawar. To make sure the country is secured from foreign invasions we need to build new airports, railways and defenses."
russiaRUSF.1453.d:0 "As the Basmachi rebels retreat into Afghan lands we have found ourselves entangled in Afghanistans problems. Since the 1919 Afghanistan has been ruled by Amanullah Khan, a westernizer and modernizing king. After his victories in 1920 and 1925 the country has almost doubled its size and population. However many conservatives arent happy with the King reformist agenda, and have organized themselves agaisnt him. Fortunately the Basmachi are allies of this conservatives tribesmen and clerics, opening a path for a mutualy beneficial deal with Amanullah. Since the 1800s Afghan has been a space of disputes between ourselves and the british, and now recently the Ottomans who supported them in their 1925 intervention in the falling Raj, with this deal we can secure Afghanistan in our sphere and protect central asia from any southern incursion."
russiaRUSF.1454.d:0 "The Afghan government was wise to accept our alliance offer, now our military mission and "cossack volunteers" are entering in Afghan territory to help put down the Basmachi rebels, while giving support against the Saqqawist rebels who plague Amanullah`s government. With this the entrance to the Khyber Pass is finally in our hands, and we can hope to stretch our influence into the subcontinent."
#Border War in Xinjiang
RUSF_Turkestan_Volunteer:0 "Turkestan Military Mission"
RUSF_Turkestan_Volunteer_desc:0 "The STAVKA has sent local cossack hosts forces to support the East Turkestani independance movement"
russiaRUSF.1485.d:0 "Today representatives of the Turkestani Army have approached our diplomatic representation in Dihua looking for support in their independance struggle against the local chinese warlord. The Turkestani have asked for "volunteer" troops and weapons deliveries and in exchange have promissed us to sign an defensive alliance, permiting us to station troops and build any fortifications we would need in their lands, and to give us great economic concessions to development efforts in their country."
RUS_XinjiangBorderWar:0 "Xinjiang protection operation"
RUS_XinjiangBorderWar_desc:0 "After the defeat of the Ma Clique in the North Western war the approaches to Xinjiang were reduced to a strip of land in the Hexi corridor. With the Chinese armies fighting against Fengtian we now have a great opportunity to instal a friendly regime in Dihua, and secure our flank from the Fengtian should they end up in control of the central government"
russiaRUSF.1442.d:0 "As the Japanese sponsored Fengtian clique advances into northern china the border region of Sinkiang found itself isolated from the rest of the country. With the prospect of a portracted conflict in China and a Japanese intervention looming in the horizon the STAVKA has setup a plan to occupy the province. In contact with the Turkestan Independence movement a plan has been drawn to send siberian cossack troops, with support from turkestani militias, to create a Turkestani Republic aligned with us and secure our flank from any attacks coming from China"
russiaRUSF.1446.d:0 "With the defeat of the Fengtian clique the prospects of a Japanese client state in China were totaly destroyed. Now with a chinese central government independent from foreing influence we need to decide what to do with our friends in Sinkiang. We can keep the province in our hands, maintaining a buffer state between us and China, or we can wash our hands of the Turkestani project and let them sort their situation with the chinese alone."
sik_peace_tt:0 "With the failure of Russia to secure Dihua the Warlord of Sinkiang has guaranteed his independence"
kum_peace_tt:0 "With the failure of Russia to secure Dihua the Warlord of Sinkiang has guaranteed his independence"
RUS_SIK_WAR:0 "Russian Intervention" 
RUS_SIK_WAR_desc:0 "The STAVKA doesnt have infinite resources and no will to spend our limited ones in the side project of a side project, if the invervention isnt over quickly our forces will leave Sinkiang to its fate"
East_China_Defence_League:0 "East China Defense League"
#Bootleg India
russiaRUSF.1443.d:0 "Bootleg version of a Indian rework"
#Eastern War
russiaRUSFN.5.d:0 "Decades after their defeat in 1905 the Russians have avenged the siege of Port Arthur. After a gruesome campaign in Manchuria the Russians have broken through japanese lines and stormed the strategic Liaoning peninsula. With the fall of Dairen, now Dalny once again, the Russians are poised to strike deep into Korea, and korean exiles are already in talks with Moscow, to try and disloge the Japanse from mainland asia once and for all."
#RusKorea
russiaRUSFN.6.d:0 "As Pyongyang falls to the combined arms of the Russian army and Korean resistance the position of the Japanese Empire in mainland asia is becoming untenable. International reactions are mixed, japanese imperalism has made then no friends among the great powers, but the idea of a Russia without a counterweight in asia is not good news for Washington, Berlin or Paris. As the world prepares for a great shakeup of the international order jubilant russian and korean resistance parade in front of the ruins of the City, while Korean politicians prepare to meet with the Russians to negotiate the ressurection of their nation"
russiaRUSF.1412.desc:0 "As our armies enter Pyongyang the comitee of exiled Korean politicians, stablished in Shangai in 1905, has come to Vladivostok to negotiate with our government about the reinstaintment of a Korean state. A new Korean state will serve as a great bulwark against the Japanese in East Asia and its stablishment would serve us a great propaganda victory in our efforst to evict Japan from the mainland."
russiaRUSF.1414.desc:0 "As of a three hours ago, while Russian troops were storming japanese trenches, the PVDM was running its most daring international operation yet. As Field-Marshal Wrangel was finishing up the preparations for the offensive into Seoul and central Korea his trusted confidant, Pavel Shatilov, was organizing his magnum opus. Two hours before the first shoots were fired in the battle for central Korea daring commandos of the Drozdovite Parachute division were inserted into the region around Seoul, and while the japanese were scrambling reinforcements to send north, they, and a group of Korean colaborators, managed to assault Gyeongungung palace and free the prince Yi from his imprisonment. As Korean resistance confirmed the rescue of the prince a Russian airfleet assalted the city to bring confusion. As the japanese were scouring the outskirts of the city, were some of our commandos were sent to spread chaos, they were taken by surprise when russian gliders assalted the central airport of Seoul. With a temporary perimeter secured a transport aicraft managed to make through to the airport and evacuated the prince to our lines. Now our commandos are trying to melt into the countyside to help the Korean resistance and to wait for our armies to get to them."
#RusParis
russiaRUSFN.7.d:0 "Today triumphant Russian troops have paraded in the Paris, and the end of Syndicalism seems close. As jubilant Russians passed by shocked frenchmen the capitals of the world prepare for another shock to the international order. With the vanquishing of Berlin and Paris only London, for now, resists. Washington and Tokyo watch in awe and terror as Europe turns to Moscow. Positive responses came only from Ottawa and Algiers in praising the Russian stand against godless syndicalism, and today the exiles delegations were received to negotiate a restitution of the French exiles and Russian support for a naval invasion of Britain. The only consensus between the great powers is that the Russian century is about to begin."
russiaRUSFN.8.d:0 "Today triumphant banner's of the Third Rome have paraded in the streets of Paris. As jubilant Russians passed by shocked frenchmen the capitals of the world prepare for another shock to the international order. With the vanquishing of Berlin and Paris only London, for now, resists. Washington and Tokyo watch in awe and fear as the Russian Eagle rises in all Europe. Overwhelmingly positive reactions were received from Ottawa and Algiers, as exiled delegations rush to negotiate with the Emperor's government the restitution of exiled France and the help of Russian armies to destroy bolshevism in Britain. As Emperor Vladimir III entered Paris in triumph he declared that "Russia will exorcise the red devil from the continent, and bring back freedom and reason to all Europe"." 
#RusLondon
russiaRUSFN.12.d:0 "Today the Russian armies have entered the city of London. As the Russian flag flies over the ancient city, which has been unconquered since the middle ages, the world watches in awe the success of the most complex military operation in world history. With the fall of London the beachead of the Russian invasion is secured, and the conquest of all britain seems inevitable. The exiles are already courting the Russian government, so that a restitution of the british monarchy be the course choosen for the future of the island. The Union government has issued a declaration vowing to throw the Russians back into the sea and calls all of its citizens to defend the revolution. The world capitals are now scrambling to adjust to the total Russian domination of Europe."
russiaRUSFN.13.d:0 "Today the Czars armies have entered the city of London. As the Russian Eagle flies over the ancient city, which has been unconquered since the middle ages, the world watches in awe the success of the most complex military operation in world history. With the fall of London the beachead of the Russian invasion is secured, and the conquest of all britain seems inevitable. The exiles are already courting the young Czar so that a restitution of the british monarchy, which has familial ties with the Romanov`s, be the course choosen for the future of the island. The Union government has issued a declaration vowing to throw the Russians back into the sea and calls all of its citizens to defende the revolution. The world capitals are now scrambling to adjust to a Russian dominated europe."
#RusInternationale Peace Deal
russiaRUSF.1417.d.britain:0 "As our flag rises in the continent Bolshevism in europe is now contained to the island of Britain. However the British bolshevists still have a large fleet and army and maintan strong defensive positions on their beaches. Now we are faced with two options, do we secure our position on the continent and leave the Bolshevists with their little island or do we atempt to be the first army to successfully cross the channel in 600 years."
russiaRUSF.1417.d.other:0 "Peace time"
russiaRUSF.1419.d:0 "As the British Bolshevists accept our negoations the Third Weltkrieg in Europe has ended. Today the European continent is free from the Bolshevists, and as Britain prepare for a new paradigm of isolation, the world begins to feel the effects of what Russian newspappers are calling the "Pax Russica"."
russiaRUSF.1420.d:0 "The British Bolshevists have refused"
russiaRUSF.1422.d:0 "Today the last holdouts of Syndicalist resistance capitulates to the Russian Army marking the end of the war in France and a great defeat for the Internationale."
russiaRUSFN.9.d:0 "Today Russia and Britain have come to an agreement to end the Third Weltkrieg in Europe. With the fall of France and continental Syndicalism the British have managed to defend their island nation from enemy incursion, however since they didnt have the forces to cross back into Europe a stalemate was maintained for a better part of a year. With this peace the era of Russian continental domination has begun and the isolated british now find themselves as the lone Syndicalists of Europe. In the Russian capital crowds are jubilant as the news of peace arrives and the newspappers are already printing about the start of the "Pax Russica" as optimism washes over Russia. The rest of the world is scrambling to reorganize their foreign commitments in light of the new juggernaut in Europe."
#Invite Fra 
russiaRUSF.1423.d:0 "Now that France is under our occupation the question of what government to install in the country is in the air. Whith a French government in Algiers the most easy proposition would be to simply isntall it once again in Paris and bring them into our alliance. However some members of our government favour the approach of creating a new puppet in Metropolitan France, arguing that this is a unique opportunity to secure the continent for ourserlves and create an ally totaly dependant on us."
#Traits
Vladimir_the_Liberator:0 "Liberator of Constantinople"
#Russo-Georgian Marriage
russiaRUSF.1430.d:0 "As the courtship between prince Vladimir and princess Leonida Bagration-Mukhransky progresses high level diplomatic negotiation between the two restored monarchies is deciding the fate of the countries. As far as ex-russian domains go the Georgians, specially the nobility, have good relations with their Russian counterparts. Georgia only declared its independence after the Bolshevik coup, as it's government was aligend with the Menshevik faction. It remained independent during the Civil War mostly because of georgian fears of Turkish invasion, wich was kept at bay by the treaty of Poti, a treaty that made Georgia a de facto german puppet and granted sweeping economic concessions, and of border disputes with the White Army. While relations after the agreement on border demarcations remained cordial a new revival in russo georgian friendship has come with the restoration of rational monarchies in Russia and Georgia, and the courtship prince Vladimir and princess Leonida. Russian diplomats are using the popularity of the young couple in both countries, and a healthy dose anti-german sentiment after the crash of black monday combined with the Georgian desires to go after territory they claim in the Ottoman Empire, to bring Georgia back into the fold peacefully, giving us a great opportunity to show eastern europe that returning to Russia can be a good deal. To try and do that our diplomats have come with an almost medieval proposal. The Georgian Kingdom would enter a relationship not so different of that in the 1800s with the Tsardom, in exchange Georgia would be independent in almost anything but foreign policy. Georgia would have its own laws, as long as they arent uncostitutional in Greater Russia, its own army, which would be nationalized, but not expected to go far away from the country, in times of war, and its owN government structures."
russiaRUSF.1430.a:0 "Let negoatiations begin"
russiaRUSF.1431.d:0 "After the annexation of Georgia in the 1800s the Georgian nobility was integrated into the russian aristocracy, with many of the Bagration-Mukhransky family serving in positions of importance. With the restoration of Monarchy in the two countries and the courtship between the prince and princess negotiations for a peaceful unification were conducted, and despite some steep demands, the Georgians were open to reunification. The most important conditions are the preservation of the Georgian monarchy, total autonomy in local affairs, promisses for the restoration of the Batumi region, the preservation of the georgian army, which would be integrated into the All-Russian army in times of war but would be expected not to be send too far from their country, and a temporary subsidy for economic reconstruction. While accepting these conditions would make Georgia our "Bavaria" in constitutional sense the prospects of a peaceful reunification, with a royal marriage on top, is too good to pass and for the propaganda value alone will be worth those sacrifices."
russiaRUSF.1431.a:0 "Now let us proceed to the marriage festivites"
russiaRUSFN.10.d:0 "Today marks a major victory for the restored Romanov dynasty. The Imperial eagle now flies alongside the Georgian flag in Tbilisi as Vladimir and Leonida marry, uniting the Romanov and Bagration-Mukhransky houses. In practice, Georgia was annexed into Russia with broad autonomy, earning the nickname ‘Russia’s Bavaria’ in the international press. However, the wedding caused alarm in Berlin and Constantinople with Germany’s land and pipeline route to Azerbaijani oil now in Russian hands, the Kaiserreich is urgently seeking new partners. Meanwhile, the Ottomans—still occupying Batumi and other Russian-claimed lands, have accelerated their rapprochement with Germany, which has already announced a new economic and military package with them."
RUS_GeorgiaCash_desc:0 "As the economic situation in Georgia needs to be reorganized after years of being turned to Berlin and the shock of Black Monday, and per our promisses into the reunfication treaty, the empire has decreed a financial subisdy for Georgias economical reorganziation and reintegration into the russian economy. This subsidy will be used to build infrastructure and to finance Georgias nascent industry."
RUS_GeorgiaCash:0 "Financial Subsidy for Georgia"
russiaRUSF.1433.d:0 "As the crisis in the Levant deepends the Georgian army has unnilateraly occupied the dusputed region of Batumi. The commander of the Georgian Army, general Giorgi Khimshiashvili, has ordered their troops to occupy the region without giving any warning to Baron Wrangel or the Czar. While oficialy we have immediately declared the liberation of our Georgian brothers in Batumi as a great victory, the government and army are furious with the Georgians for acting unniltarely, and risking german intervention. However the Georgians, claimed to be exercising their rights per our union treaty, which gives them autonomy to move their army in their territory in peace time without any Russian input, since for them Batumi is Georgian territory, illegaly occupied. Now as Berlin and Konstantiniye process the situation our diplomats are hurrying to the European capitals to prevent another war from breaking up. Our diplomats in france and britain have already gave us assurances that the western bolsheviks will come to our aid if the worst comes. However with the Ottomans in a precarious position the germans may well convince them to sacrifice Batumi while Berlin helps them rearm."
russiaRUSF.1433.a:0 "The Georgians have played us!"
russiaRUSF.1434.d:0 "Fortunately the now called "Batumi Crisis" has not escalated into a full war. While Konstantiniye and Berlin are furious the Germans arent willing to risk a full out war with us over Batumi, specially with the Ottomans precarious position, while there is a risk of a simultaneous conflagration in the North Sea. However this crisis has accelerated war plans in Paris, Moscow and Berlin and its clear that europe is heading into a new Weltkrieg soon and every side is moving to consolidate its position."
russiaRUSF.1434.a:0 "That was dangerously close"
russiaRUSFN.11.d:0 "As the levant crisis continues to shake the Middle East the Georgian army has occupied the strategic port of Batumi. With the occupation of internationaly recognized Ottoman territory a great crisis has raged in europe in the last few days. As the continent is ever closer to another war the Russian and German governments have made a deal regarding the city. In exchange for recognizing the annexation of Batumi into Georgia the Germans have requested financial compensations for the Ottoman empire, as well as a Russian signature into a non-intervention pact in the Levant Crisis. Experts believe that this will do little to reverse the course of Russo-German relations, but with the loss of direct contact to Azerbaijan through Georgia the Germans arent in a position to storngly retaliate, at least untill the Ottoman Empire fortunes are reversed."
russiaRUSFN.11.a:0 "The world breathes a sight of relief"
OTT_OttoCash_desc:0 "As part of the deal to resolve the Batumi Crisis we are receiving financial compensations from the Russians"
RUS_OttoCash_desc:0 "As part of the deal to resolve the Batumi Crisis we are giving financial compensations to the Ottomans"
RUS_OttoCash:0 "Financial Compensation to the Ottomans"
OTT_OttoCash:0 "Financial Compensation from the Russians"
russiaRUSF.1434.d:0 "With the Russo-Georgian reunification we have no choice but to approach the Germans for help. Fortunately the loss of Georgia and a direct route to Azerbaijain has made them eager to help us, and already a military contract for new equipment is being implemented. As we are now the only link germany has to the black gold of Baku our strategic position growns invaluable."
russiaRUSF.1435.d:0 "As the Batumi crisis was resolved the Germans have appoached us with a new military contract, payed by the Russian reparations, to supply us with necessary arms to finish of the damned Egyptians and Persians."
russiaURSF.1476.d:0 "With the end of the crisis in the Levant and the defeat of the Egypt and Persia the german government have approached us with a formal invitation into the Reichspakt. With the Russo-Georgian unification the germans access to the Baku oil fields was severely hampered, and as war looms into the horizon they are eager to secure their access to middle eastern oil. With an Russian Tsardom resurgent in our northern border the opportunity to have access to germany`s industrial might advance technology and web of alliances is too good to let it pass us by."
russiaURSF.1477.d:0 "After the aggressive movements by our Georgian friends in the Batumi crisis the germans have doubled down in their support for the Ottoman Empire, and have approached them with a formal invitation into the Reichspakt. With the end of the Levant Crisis the ressurgent Ottoman Empire is now turned into a viable ally for the Germans, with their access to the middle eastern oil fields secured. Now we will have a new front to worry about in the south."
OTT_GermanHelp:0 "German Military Support"
OTT_GermanHelp_desc:0 "After the payment of the Georgian compensations the Germans have offered us new military contracts to supply our forces with new equipment to finish of the Egyptians and Persians."
russiaRUSFN.25.d:0 "With the Ottoman victory in the Levant Crisis and the threat of the Russian Empire looming in the north, the Ottoman government has been officially drawn into the German security umbrella and joined the Reichspakt. With this move the Kaiserreich has secured its access to the oil fields in the middle east and Azerbaijan, while the Ottomans have secured access to german armaments and security agaisnt a ressurgent Russia. With this new alliance the tensions in Europe have skyrocketed and specialists have already started to talk about the inevitability of a new conflagration in the continent."
russiaRUSF.1477.d:0 "With the seizure of Batumi by Georgians we have burned our bridges with the Ottoman Empire. Today with the end of the Leavant Crisis the Ottoman Empire has officialy joined the Reichspakt."
#FreeGreece
russiaRUSF.1437.d:0 "As our troops march into the Greek inhabited areas of Anatolia the Greek government in exile has approached us with a proposal for the creation of a Free Greek State. As their homeland is now occupied by bolshevist thugs, the Greeks are searching for a new base to stablish a counter-revolutionary government and army that they hope one day will free all Greece. The Greek exiles have great support in our military and political circles, as their situation is not that different from when Russia was engulfed by the darnkess of Bolshevism and our only light had been Kornilov on the Don. However this Free Greece, if stablished, will have to fight a uphill battle to survive. As the regions they claim are inhabited mostly by a mix of diverse types of Christians and a sizable Turkish Muslim majority this new state will need great help to stabilize itself, and it will certainly be very dependent on us untill it can solve its relationship with its future turkish subjects. However it will also be a staunch ally against any turkish ressurgence in Anatolia and give us imense credibility in resistance circles anywhere bolshevism has touched."
#Alyaska
russiaRUSF.1438.d:0 "As the situation in North America deteriorates further and the Canadians are being seriously threatened by the American bolshevists, Grand Admiral Kolchack has come up with a daring plan. As the American Bolshevist navy is extremely weakened by their fraticidal war and is kept busy by the Canadians we have the opportunity to seize Alyaska. A strategic position in the north, and still held by the Canadians, securing a port and base in North America would be a great strategic blow to the American Bolshevists, recuperate our long lost colony. Even though we sold the territory to the USA in the 1800s we can sell the operation to our public, and the Alaskan population, as a way to protect Russian heritage, and personals properties of the local inhabitants, from the Godless bolshevists. We expect no Canadian resistance, as they are heavily invested in the South, and would prefer a friendly russian occupation, if we assure their usage of shipping lanes and protection from Bolshevist vessels in Alaskan waters, than a bolshevist invasion. The admiral has already prepared the Pacific Fleet to sail and 2 marine divisions are preapred to occupy Anchorage and Juneau, if we give the order."
russiaRUSF.1439.d:0 "As we successfully occupy Juneau and Anchorage our forces have been approached by exiled Federal American generals who plead for a reinstatement of the Federal government in Alaskan soil. The commite led by general Einsenhower is formed by military and political leaders who were opposed to the bolshevisation of their country and seeked refuge in Canadian Alaska. They plead us to stablish a sanctuary and a army for the real American ideals of Freedom, a light in the darkness that is engulfing their continent, a not so different situation to ours on the Don in 1918. While occupation of the territory will make the relations with the American Bolshevists difficult, the idea of stablishing a competing government will assure the impossiblity of diplomatic relations with Chigago for the forseable future. However if the Continental Bolshevists do end up falling from their internal strife a gratefull US government, ready to take over the country, would be a unshakable ally to our cause." 
#Balkan Relations
russiaRUSF.1444.d:0 "With the end of the Balkan war and the defeat of Bulgaria our government has approached the victorious Belgrade Pact to offer new credit lines for the consolidation of their new territories, in exchange for further military cooperation and access to through their land in times of war."
russiaRUSFN.18.d:0 "As the Serbian Monarchy rebound from their defeat in the Weltkrieg and reconquer Macedonia from the Bulgarians a new "old" order is drawing in the Balkans. As commemorations abound in Belgrade and Bucharest the Russian government has announced a royal tour in the Balkans. While the meeting between Kirill I and Petar II was wildy reported in the papers it appears that the Marhsall of the Empire, Baron Wrangel, has stole the spotlight. After visiting a church in Belgrade with Marshall Zivkovic the Baron was assalted by the press as journalists try to press questions about commitments to Belgrade and Bucharest. The Marshall, while not giving solid commitments, gave a speech about the deep russo-serbian friendship and their camaraderie in the Weltkrieg. The Habsburgs were infuriated by the visit and have condemed this tour as senseles saber-rattling"
russiaRUSFN.19.d:0 "As the Serbians rebound from their defeat in the Weltkrieg and reconquer Macedonia from the Bulgarians a new "old" order is drawing in the Balkans. As commemorations abound in Belgrade and Bucharest the Russian government has announced a presidential tour in the Balkans. While the meeting between Russian and Serbian presidents was wildy reported in the papers it appears that Baron Wrangel has stole the spotlight. After visiting a church in Belgrade with serbian officers the Baron was assalted by the press as journalists try to press questions about commitments to Belgrade and Bucharest. The Baron, while not giving solid commitments, gave a speech about the deep russo-serbian friendship and their camaraderie in the Weltkrieg. The Habsburgs were infuriated by the visit and have condemed this tour as senseles saber-rattling"
russiaRUSFN.20.d:0 "As the Serbians rebound from their defeat in the Weltkrieg and reconquer Macedonia from the Bulgarians a new "old" order is drawing in the Balkans. As commemorations abound in Belgrade and Bucharest the Russian government has announced a royal tour in the Balkans. While the meeting between Kirill I and the serbian president was wildy reported in the papers it appears that the Marhsall of the Empire, Baron Wrangel, has stole the spotlight. After visiting a church in Belgrade with serbian officers the Baron was assalted by the press as journalists try to press questions about commitments to Belgrade and Bucharest. The Marshall, while not giving solid commitments, gave a speech about the deep russo-serbian friendship and their camaraderie in the Weltkrieg. The Habsburgs were infuriated by the visit and have condemed this tour as senseles saber-rattling"
russiaRUSFN.21.d:0 "As the Serbian Monarchy rebound from their defeat in the Weltkrieg and reconquer Macedonia from the Bulgarians a new "old" order is drawing in the Balkans. As commemorations abound in Belgrade and Bucharest the Russian government has announced a royal tour in the Balkans. While the meeting between the russian president and Petar II was wildy reported in the papers it appears that Baron Wrangel has stole the spotlight. After visiting a church in Belgrade with Marshall Zivkovic the Baron was assalted by the press as journalists try to press questions about commitments to Belgrade and Bucharest. The Baron, while not giving solid commitments, gave a speech about the deep russo-serbian friendship, their camaraderie in the Weltkrieg and Petar´s father courage. The Habsburgs were infuriated by the visit and have condemed this tour as senseles saber-rattling"
#Letter
russiaRUSF.1449.d:0 "While General-Field Marshal Wrangel marched into the Kremlin to arrest Savinkov, an infantry detachment under General Shatilov was dispatched on an equally vital mission: to secure the Historical Archives of the Russian Republic. After establishing a perimeter and holding the archivists at gunpoint, the soldiers began confiscating documents related to the Imperial Family. Their objective was a single, seemingly insignificant letter, one that could inflict irreparable damage on the Field Marshals plans. Written in 1917 by Grand Duke Nicholas Mikhailovich addressed to Alexander Kerensky, the letter formally renounced his lands and rights of inheritance, together with other Romanov princes such as Kirill. If Kirills line were excluded, there would be no remaining claimant untainted by the complications of the Pauline Laws, forcing the throne to be declared vacant. Insignificant at first glance, the letter is in fact the Achilles heel of any Romanov restoration. In the wrong hands, it could derail monarchist ambitions entirely. After hours of painstaking search, Shatilov finally located one copy of the document, filed among the otherwise unremarkable Kerensky papers. With the letter secured, he rushed back to the Kremlin and delivered it personally to General-Field Marshal Wrangel. Wrangel read the letter once, then, without a word, tossed it into the fireplace. Moments later, the Field Marshal entered his automobile and departed to address the National Assembly."
russiaRUSF.1450.d:0 "Today Russia awoke with surprising news from abroad as it is reported that Aleksander Kerensky has died in New York. Late last evening, the former president was admited in the hospital and died some hours later, the official cause of death listed as complications from a heart attack. Yet the circumstances surrounding his passing have already raised troubling questions. Only days earlier, medical examinations had found Kerensky to be in good health, with no indication of any underlying conditions. Further complicating matters, his wife has stated that Kerensky’s personal collection of letters from his time as president have disappeared on the night of his death, while the couple was away at the hospital. The contents of these letters remain unknown, as does the reason for their sudden disappearance. Authorities report no signs of forced entry within the apartment, and in the absence of evidence, the death has been officially ruled natural. Nonetheless, the announcement has ignited quiet speculation as Kerensky was sending fillers to journalists in the last few days about a revelation that would "shaken the farce of restoration". Though his death made the front pages of nearly every newspaper, the obituaries themselves were notably cold. For more than a decade, Kerensky had been widely condemned for his role in the chaos of 1917, often portrayed as the man whose failures opened the door to the Bolshevik seizure of power. Branded a persona non grata and consigned to political exile for the last fifteen years. Now, his few remaining supporters struggle to defend his place as one of the architects of the February Revolution."
#Rebirth of the Special Chancellery
russiaRUSF.1478.d:0 "The web of inteligence and counterintelligence agencies of the Russian Republic was a mess of overlapping jurisdictions and rivalries. While the Interior Ministry has its own intelligence apparatus, derived from the old Okhrana, the military has maintaned its own foreing and domestic services, heirs to the Azbuka of the civil war, in the form of the Fith Deparment of the War Ministry. While in thesis all agencies reported to the presidency the distrust of the army, and the failing institutions of the republic, produced a mess of inter-service rivalries, all the while Savinkov created another parallel intelligence service under Grosstrazha. With the restoration of the monarchy and the reorganization of the government, Baron Wrangel has now sought a reform to intelligence services to create a more efficient and unified system. The Fifth Department of the War Ministry, shortened to the acronym PDVM, headed by Shatilov, will gain proeminence as the main foreign intelligence service, while the MVD will be given full responsability and powers for domestic security and repression of political extremism. The OON, under the MVD, will continue to be in the stewarship of Klavdy Foss, a staunch monarchist and superb organizer and Shatilov will take controll of the expanded Fifth Department. In this new format the MVD operations are privy to the Duma, as overseen by the Interior Ministry, while the PDVM reports directly to the Council of Ministers and the Czar, which has already made the agency known colloquialy as the new Special Chancellery, giving it great discretion on how it runs its operations. As Shatilov is universaly recognized as Wrangel's most trusted liutenant, this reforms effectively gives the Field Marshal direct control over foreign intelligence."
#KMT
russiaRUSF.1451.d:0 "The Moscow Committee of the Chinese Nationalist Party (KMT) was organized in early 1925 by the Western Hills Conference, the rightist political faction of the party, which opposed the Syndicalist turn in KMT politics and the Wang-Chiang domination of the party. After the fall of the Northen Expedition the political figures of the Right KMT took flight to Moscow, while its military allies retreated in the direction of Yunan and northen Liangguang. While here they hoped to mobilize Russian support to the KMT cause and prepare their return to China, to oust the hated Qing monarchy and the Zhili clique. Now with a province liberated and loyal to the ideals of the Rightist Faction the Committee is preparing to leave Moscow. After a meeting with the foreign office the RKMT is hoping to secure direct support for their cause and a military mission to modernize their armies."
russiaRUSF.1452.d:0 "The Persian province of Tabriz has always been of interst to Moscow. During the First Weltkrieg the province was occupied by our forces to secure our flank from a Ottoman atack into Persia. The province has also a majority population of ethnic Azeris, who yearn to be reunited with their brethren in Azerbaijan. With our occupation of Azerbaijan and Persian we could use this unification fever to annex the Trabriz province into the Azerbaijani Autonomy, and buy some good will with the Azeris. However annexing this territory will surely not be a popular decision with the Persians, which may be turned into a reliable ally in the Region."
#Romania Coup
russiaRUSF.1457.d:0 "With the fall of Germany and Austria we and our Romanian allies have finally achieved supremacy in Eastern Europe. However Romania finds itself in a difficult position. The chaos caused by the war and the Legionary government has transformed the country in a battleground between king Carol II and the so called Conducator Corneliu Codreanu. It appears that the Legionary thugs have won the struggle and took controll of the government, however the army and the political elite of the country arent all aboard with this change in paradigm. General Shatilov has approached the cabinet with a proposal from Romanian Officers too coup the Government and restore more savoury politics. While our ally during the war the prospect of having a neighbour follow an ideology so closely aligned with Savinkovism is worrying, and it would be a great coup to restore a more rational government in Bucharest. Shatilov has given 2 plans of action, the first is to offer the minimum support for the putch and hope tha the Romanians can solve their situation mostly alone. The second is a more direct intervention, with our troops crossing the border from Ukraine to disarm Legionary supporters in the east of the country and the landing of a paratrooper regiment in Bucharest airport immediately to help our allies secure the capital. While the second option is the most likley to succed it will also be impossible to deny any involvements with it if the coup goes sideways and it would put us effectively at war with the Romanians in that case."
russiaRUSF.1458.d:0 "The coup in Romania has gone fantasticaly wrong, even with support from our paratroopers the Romanian officers were unable to secure the legionary leadership or the capital. Our paratroopers have been made prisioners and the pictures of their surrender have made international news. Now we have but no choice to commmitt to a full invasion of Romania, least our newly integrated territories get any dumb ideas, to not have our international image be even more sullied by leaving this unpunished."
russiaRUSFN.14.d:0 "Today a group of officers have tried to pull a coup de etat in Bucharest. Dissatisfied with the Legionnary government the group moved to occupy the countries parliament and arrest the legionary leadership in the countries biggest cities. Troops loyal to the Legion and armed their paramilitaries have repulsed the troops. The legions Conducator has announced a new wave of national secutiry laws and promissed swift punishment to the plotters and their civilian colaborators, all who hem accuses of being a part of a global freemason plan against the Romanian Revolution. With the military neutralized the Legion has effectively destroyed its last source of opposition and its poised to rule Romania uncontested."
russiaRUSFN.15.d:0 "Today a group of Romanian officers and Russian paratroopers have toppled the Romanian government. Dissatisfied with the Legionary Government the group sought support from their Russian allies in a lightining campaign to storm the countries parliament and to arrest the legionary leadership in the country. Troops loyal to the Legion and their paramilitaries have been disarmed while their leaders await trial. New elections have been announced and the poisition of King has been restored to its full constitutional power. This coup marks a great development for the Russians, who had a difficult relationship with the Legion, and show that the Bear has the cappacity, and will, to rectify the internal politics of any ally it deems to stray too far into what they consider unsavory ideologies"
russiaRUSFN.16.d:0 "Yesterday a group of officers and Russian paratroopers have tried to topple the Romanian government. Dissatisfied with the Legionary government the group sought support from Russia. However their bid to storm the countries parliament and to arrest the Legion leadership failed spectacularly. Troops loyal to the Legion and their paramilitaries have disarmed the plotters and captured the Russian paratroopers. Pictures of Russian prisioners are spreading like wildfire in newspappers as the Russian government immediately declared war on Romania, announcing that it seeks to depose the deranged legionnaries and bring democractic government back to the Romanian people."
#Vietcong
russiaRUSF.1459.d:0 "As the situation in Indochina escalates the Viet Min have launched a full uprising agaisnt their German occupiers. While aligned with France the Viet Min have been triyng to contact both factions of the KMT for support. Our friends in the Rightist Faction are suspicious of the Viet Min advances, who are more aligned to their leftist brethren. However the same routes through Tibet, Burma and Yunnan, that we use to support our friends in South China, could also be used send some support to the Viet Min. Indochina is rich in natural resources and has a strategic position in the South China Sea, with the send enough help we can use it to secure a deal with Indochina for the use of their ports and rubber. The civilians in the cabinet is all up for the deal, but the STAVKA will need more pressure to accept the idea of helping Indochinse Bolshevists."
russiaRUSF.1460.d:0 "With our first deliveries done our friends in Indochina are salivating at the prospect of more arms and ammunition. In return they are offering access to their southern rubber plantations. While they are asking for a great deal of materiel, the prospects of securing a rubber supply for our military industry is very tempting, however an Indochinese victory is still a unprobable outcome and our investment could go down the drain if they loose."
russiaRUSF.1461.d:0 "The Russians have delivered us a great deal of arms and ammunition through their KMT allies. However if we were to offer more substantial concessions, specially access to our rubber plantations, we could secure a much more steady flow of arms and ammunition, which would be a great help for our cause. However this would also make us more dependent on the Russians."
#Gotland Generic
russiaRUSF.1462.d:0 "As our troops secure the Island of Gotland our general staff and cabinet are divided on what to do. The Island is claimed, and owned, by Sweden for hundreds of years, but our Naval and Airforce chiefs argue that the island's strategic location in the middle of the Baltic Sea is too valuable to simply give it back to the Swedish. The Navy and Airforce propose that we annex the island, to permanently control the vital naval and air bases, while the civilian members of the cabinet are urging to return the territory to the Swedes, as a way to solify their place in our sphere of influence. As the debates goes on and on at very last one side gives up..."
#Gotland Russia
russiaRUSF.1464.t.1:0 "The Empire Strikes Back"
russiaRUSF.1464.d.1:0 "The Island of Gotland was always seen as a great strategic position the Baltic Sea, and our lack of controll of it has shaped naval and comercial policy for centuries. In the year of 1808 Czar Alexander I, The Blessed, sent a force to occupy it as the Finnish war raged, however great setbacks in the expedition resulted in the expulsion of our army from the Island. Today the Russian Empire has finally achieved Alexanders dreams of total Baltic dominion with the annexation of the Island of Gotland. Great changes have already been made as the new province's capital, named Visby, was rechristened as AlexanderGrad and great works to expand it, and the naval and air bases in the region, are underway. With this great conquest the restored Czar has secure the dominance of the Baltics for centuries to come."
russiaRUSF.1464.t.2:0 "A great victory for the Admiralty"
russiaRUSF.1464.d.2:0 "The Island of Gotland was always seen as a great strategic position the Baltic Sea, and our lack of controll of it has shaped naval and comercial policy for centuries. In the year of 1808 Admiral Bodisko occupied it as the Finnish war raged, however great setbacks in the expedition resulted in the expulsion of our army from the Island. Today Russia has finally achieved the total conquest of Baltic with the annexation of the Island after an operation by the or beloved Admiral Kolchak who occupied the Island during the war. Great changes have already been made as the new province's capital, named Visby, was rechristened as KolchakGrad and great works to expand it, and the naval and air bases in the region, are underway. With this great conquest the we have secured the dominance of the Baltics for centuries to come."
