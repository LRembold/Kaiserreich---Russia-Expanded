### Characters ###
CZK_Maria: "Queen Marie Romanowská"
CZK_Maria_desc: "Queen Marie Romanowská, born Maria Romanov, is the sister of Czar Vladimir III. Elected by the Czechoslovakian National Council as Queen of the Czechs and Slovaks in a bid to garner more russian support for their cause. After receiving a new "Czechified" name during her coronation in Prague, Queen Marie now has the job of leading her adopted peoples into a new age of freedom and prosperity in a Russian dominated eastern europe. While still seen with suspicion by more Austrian aligned circles the Queen has received a warm welcome by the countries population, who is tired of war and looks forward to peace in europe."
 