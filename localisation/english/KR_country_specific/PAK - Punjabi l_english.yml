### Focuses ##


### Ideas ###
 PAK_German_support: "German Military Mission in Punjab"
 PAK_German_support_desc: "The German Military Mission in Punjab, headed by Werner Otto Von Hetig, was brought to the country in 1925 after the start of the British Revolution. With German help, which was already stirring independence movements in the Punjab, the Punjabi army was able to stop the Republican advance in the Rajaputana Region and the Afghans at Quetta. After 10 years the mission has transformed the Punjabi Army into a throughly Prussian style army, with great emphasis on mobility and firepower."
 PAK_Muslim_League: "The Muslim League"
 PAK_Muslim_League_desc: "The Muslim league has been at the forefront of our independence movement. Advocating for a separate Muslim state in the subcontinent they are a powerhouse in Punjabi politics and are our main way to influence our religious brothers in Bengal"
 PAK_Bengal_Muslims: "The Bengali Situation"
 PAK_Bengal_Muslims_desc: "The Muslims in Bengal have long felt repressed by the atheistic syndicalists. This situation has given us ample oportunity to infiltrate spies on their lands"
 PAK_German_Assistance: "Punjabi-German Economic and Military Cooperation"
 PAK_German_Assistance_desc: "In an effort to bolster our army we have entered a new economic and military deal with the German Empire. In exchange for licenses to their most modern equipment we have agreed to major economic concessions to german companies."
 PAK_Black_Monday: "Black Monday in the east"
 PAK_Black_Monday_desc: "The global economic crisis has hit Punjab hard, with our exports plummeting and unemployment rising. We must take decisive action to stabilize our economy"
 PAK_Industrial_Spending: "Industrial investments"
 PAK_Industrial_Spending_desc: "To recover from the economic downturn, we must invest in our industrial sector. By modernizing our factories and infrastructure, we can create jobs and stimulate growth."
 PAK_Military_Spending: "Military investments"
 PAK_Military_Spending_desc: "As the INC start to make aggressive moves against us and the princes in the south the government has approved a new military spending package to guarantee our security."
 PAK_German_Army: "Prussia of the East"
 PAK_German_Army_desc: "As the German Military Mission have helped us create our armed forces we have adopted many of their doctrines and organizational structures. This has created a military culture with great emphasis on initiative and mobility."
 PAK_Kashmir: "The Maharaja of Jammu-Kashmir"
 PAK_Kashmir_desc: "The Maharaja of Jammu-Kashmir is one of the most important princedons that makes up our governemnt"
 PAK_Bikaner: "The Maharaja of Bikaner"
 PAK_Bikaner_desc: "The Maharaja of Bikaner is one of the most important princedons that makes up our government. Ruled by the Mahajara Ganga Singh it is the most democraticaly oriented princedons in our state."
 PAK_Divide_desc: "Our state is regarded by most countries as a purely artificial one. Built by the Muslim League of India and a swathe of northern Mahajaras who wanted to resist the socialist policies of the INC in Calcutta our administration is a mixture of traditional princedons and a modern state. This has created a divide between members of the Muslim League, who want a independant Muslim state in the north, and the princes more aligned with the idea of a united India. In this situation the fear of Calcutta, and a significat amount of German help, hold this strange coalition together."
 PAK_Divide: "National Divisions"
 PAK_Baluchistan: "Balochistan Relations"
 PAK_Baluchistan_desc: "The princely states of Kalat, Makram, Kharan and Las Bela have formed a powerfull block on our new state. The 4 princes have united behind the prince of Kalat to preserve their autonomy in the country"
 PAK_Gwadar: "Gwadar Federal Territory"
 PAK_Gwadar_desc: "The Gwadar Federal Territory was created in 1926 after a deal with Oman. Its port facilities, mostly funded by our German friends, are essential for the development of the Balochistan region. The economic development generated by the port, and its status as federal territory, has helped the government to placate Balochistani independence ideas. The free access given to Afghanistan to the port has also asurred, for now, that the Kingdom doesnt assert its claims in the province of Quetta."
  
  
