### Focus Tree ###
hla_setup: "Setting up a administration"
hla_setup_desc: "With the creation of the Protectorate we must now set up a temporary administration to pacify the region and start the reconstruction."
hla_loan: "Reconstruction Loans"
hla_loan_desc: "Every reconstruction needs money, to this end we will need to take a loan from the Motherland's central bank to fund the reconstruction of essential infrastructure."
hla_garrison: "Russian Garrisons"
hla_garrison_desc: "To ensure the security of the Holy Land we will need to station a permanent garrison in the region. For this end Stavka has approved the diversion of 3 brigades from the Russian MVD to secure and pacify the protectorate."
hla_reunion: "Inter-Religious Council Administration"
hla_reunion.desc: "As our administration solidifies we are now bringing the most proemninent religious figures to our side by creating a Inter-religious. This council is to be prepared to assume state functions and establish a solid adminstration as we prepare to withdraw our military administration."
