### World Tension ###
 

### Events ###
 AFG_event.1.d: "After his father`s assassination in 1919 king Amanullah has been taking the country in a steady course to modernity. Passing the first constitution in the history of the country in 1922 the king has worked to industrialize and centralize the nation. In 1920 the king won a great victory agaisnt the British colonizers and finaly brought real independence for the country. In 1925 he once again brought victory against the failing british army in the Raj. After those victories Amanullah had great prestige in Afghan society and started to push his reformist agenda. Bringing education, most controversialy to woman, to the urban centers of the country. With this the country is going through a process of incipient industrialization, and a importation of many western customs. A great ally of Amanullah reforms has been the Sublime Porte, the most important military and educational partner to Amanullah, with even mutual visits between Amanullah and vizier Mustafa Kemal. However in a country with a tribal political organization and a strong islamic jurist tradition the idea of modernity has granted Amanullah many enemies, and with a greatly expading urban-rural divide, the country is not as well as it seems to outsiders."
 AFG_event.2.d: "While Amanullah`s reforms are in full steam on the urban centers his controll of the countryside remains disputed. Some tribal leaders, fearfull of centralization are conspiring with bandits in the mountains to brings instability to the country. One of those groups, the Saqqawists lead by Habibullah Kalakani, are one of the most dangerous ones. With support of the most rebelious of the Ulema, some Tajik tribal leaders and connections with the states in Central Asia, Kalakani has been a torn in the government`s efforts to secure the countryside. With the ever widening differences between the interests of the centralizing state and the traditional leadership on the countryside there is fertile ground to rebellion and banditry agaisnt the kingdom."
 AFG_event.3.d: "After the fall of the British Raj in 1925 we have managed to occupy the province of Peshawar. However with a population bigger than the rest of the country and a economy more developed than most of it the province has been very difficult to integrate."
 AFG_event.4.d: "With the fall of the Central Asian regimes soldiers and mercenaries, called Basmachi, have crossed the border into our country. Being given refuge by their tribal relatives and friendly tribal leadership this bandits have turned into a great problem for our king. The conservative tribal leadership have used this opportunity to mobilize these troops agaisnt the governemnt in hopes of removing king Amanullah and start a pan-islamic movement to liberate Central Asia."
 AFG_event.5.d: "The Russians are having great problems with the Basmachi bandits coming from our northern border. Not interested in a invasion of our territory the Russian foreign ministry have sent us a great proposal. They are offering membership in their military and economic bloc in exchange for the destruction of the Basmachi in our borders. With this deal we can use the Russian help to remove difficult tribal leaders and insert our country into the international stage. However we would tie our fate to the Russians, and with a new Russo-German war in the horizon it may be a bad idea to sacrifice our neutrality."
 AFG_event.6.d: "With the Persian-Egyptian invasion of the Ottoman Empire the Sublime Porte has recalled their military mission from our country. While our relationship with the Ottomans were already cooling down, after black monday and the Russian return to Middle Eastern and Subcontinental politics, the withdrawing of the military mission has effectively ended the Afghan-Ottoman special relationship."
 AFG_event.8.d: "With the world markest shaken by Black Monday our export based revenue streams are greatly diminished. Also the vital stream of foreign help to our incipient industrial base, payed for by our agricultural exports, is now mostly gone. For now the government is precariously able to balance the budget and pay for our most important expanse, subsidies to keep the tribal leaders in line, however with the crisis deepening its a question of time untill political stability is shaken."
