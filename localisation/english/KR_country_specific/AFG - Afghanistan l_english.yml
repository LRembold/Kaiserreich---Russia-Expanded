#Spirits 
 AFG_College: "Student Movemens in Afghanistan"
 AFG_College_desc: "Afghanistan’s student movement has grown rapidly in recent years, emerging as a new political force in the wake of Amanullah Khan’s reforms. The annexation of the more developed region of Peshawar, with its established colleges, and the founding of the University of Kabul in 1925, have drawn a rising generation of educated youth into political life. For now, the students largely support the government’s reformist agenda, seeing it as the best path toward modernization. Yet their loyalty is tempered by growing demands for a more representative system, free parliamentary elections and a new more modern constitution. Concentrated in the urban centers of Kabul, Kandahar and Peshawar, the movement is influential, but confined to the urban world, while the countryside lies beyond its influence."
 AFG_Ulema: "Muslim Clerics"
 AGF_Ulema_desc: "The Afghan Ulema is a collection of Islamic Clerics and Judges. The Ulema was always a powerfull institution in Afghanistan and with the institutionalization of Sharia in the 1900s the Ulema has reached the heights of its power. The Ulema are great opponents of Amanullah Khan reformist agenda, with some of their number joining the Sawaqqists rebels in the countryside. Having great power in the rural regions, while in the modernizing urban centers their influence is steadly diminishing"
 AFG_OttomanMission: "Ottoman Military Mission"
 AFG_OttomanMission_desc: "The Ottoman Military Mission, lead by the controversial and effectively exiled Djemal Pasha, has been modernizing the Afghan Royal Army since the 1920. The military mission in Afghanistan is one of the great resources of the Ottoman Empire in its war for influence with the Germans in the east"
 AFG_Peshawar: "Integration of Peshawar"
 AFG_Peshawar_desc: "The conquest of Peshawar in 1925 has shook Afghan Politics to its core. More urbanized and rich than most of the country of Afghanistan the province, mostly ethnic Pashtuni, has been a great aditiion to the domains of Amanullah Khan. While the province still has great tribal elements in its interior it also brought with it a more advanced economic and education stablishment, that has been a great ally of Amanullah's agenda of modernization. However with almost the same population than the rest of Afghanistan the integration of Peshawar has been a great challenge"
 AFG_Quetta: "Quetta Conflict"
 AFG_Quetta_desc: "The conflict between Punjab and Afghanistan is dormant since the 1927 Quetta conference, brokered by the Ottomans and Germans. In exchange to access to the new Gwadar port and the construction of a Gwadar-Quetta-Peshawar raillway, and the threat of Ottoman decoupling from Afghanistan, the Afghan government has ceased its border raids into the Punjab, and for now is not enforcing its disregard for the Durand Line"
 AFG_Pashtun_Nationalism: "Pashtun Irredentism"
 AFG_Pashtun_Nationalism_desc: "The Pashtun people was divided by the English during the various Anglo-Afghan wars, and the stablishment of the Raj. Inhabiting a area encompassing Afghanistan, the province of Peshawar and the province of Quetta, the Pashtuns are the most important ethnic group in Afghanistan. While the Pashtun groups outside the country are sympathetic to the idea of being integrated into Afghanistan"
 AFG_Industrialization: "incipient industrialization"
 AFG_Industrialization_desc: "With the modernization decress of Amanullah Khan Afghanistan is finally entering the era the capitalist economy. With the abolition of in kind taxes and the introduction of a monetary economy the country is finally developing somewhat of a industrial base. Mostly composed of craftsman and workshops there is still very few modern factories in Afghanistan."
 AFG_Tribes: "Tribal society"
 AFG_Tribes_desc: "Afghanistan, despite the King`s efforts, is not a centralized country. Its tribal leaders have great power in the countryside, where the central government rarely reaches, and are de facto responsible for governance in most of the country. With the centralization efforts going on the tribal leaders are worried about their future, and are together with the Ulema, holding Amanullah`s modernizing reforms"
 AFG_Basmachi: "Basmachi bandits"
 AFG_Basmachi_desc: "The Basmachi who resisted Russian intervention in Central Asia "
 AFG_BlackMondayIdea: "Export Crisis"
 AFG_BlackMondayIdea_desc: "Our exports are falling and together with then most of government revenues"

### Intro Screen ###
 AFG_country_intro_background: "GFX_AFG_intro"
 AFG_country_intro_header: "The Kingdom of Afghanistan"
 AFG_guide: "There is no guide yet, lol"
 AFG_country_intro_content: "Despite germany`s best efforts the Weltkrieg passed by Afghanistan with almost no consequences. However the end of the conflict and the weakening of it`s great enemy, Great Britain, opened the opportunity for the country to finally gain controll of its foreign policy in 1919. In the Third Anglo-Afghan war the Afghans managed to bring the exausted british to the negotiation table, a great victory for young king Amanullah. After its victory against the British king Amanullah looked outwards to strengthen his country. To do this Amanullah sought to strengthen his relationship with the Ottoman Empire and in 1920 the Ottoman Military mission lead by the disgraced Djemal Pasha sought to bring the young army to european standards. With them also came Intellectuals and teachers to help bring modernity in its fullest and the first western schools and colleges were open in Kabul. In 1925 the modernizing country was once again tested by the collapse of the British Empire. Mobilizing Pashtun nationalist sentiments and the tribal leadership the Afghans crossed the border into Peshawar to conquer the province from the collapsing Raj. Amanullah`s army was victorious against the confused british division in the region but was stopped in the city of Quetta by the mobilizing punjab army. With the conquest of Peshawar the country doubled its population and economy, however the province and its institutions are proving difficult to integrate into Afghanistan. Now, in 1936, king Amanullah finds himself in a dangerous position. His reforms are extremely impopular with the Ulema and the Tribal chiefs, and the national prestige he managed to get from his wars in 1919 and 1925 is slowly evaporating. Conflict brews in the horizon as the conservative forces in the country are mobilizing agaisnt the king."

### Characters ###
 AFG_amanullah_khan: "Amanullah Khan"
 AFG_amanullah_khan_leader_desc: "§YBorn:§! §LJune 1st, 1892, in Paghman, Kabul Vilayet, Emirate of Afghanistan§!\n§YBackground:§! §LWho but Babur has ever brought greater change and prestige to Afghanistan than Amanullah Khan? Ascended to the throne amidst the Weltkrieg, Amanullah immediately attacked the British Empire and won handsome concessions. He capitalised on this victory and subsequent further gains following the collapse of the British Empire to implement sweeping social reforms. Though Amanullah's rule remains absolute, he dreams of bringing true constitutional governance to Afghanistan and overcoming the nation's deep ethnic and tribal divisions. Time will tell if this great reformer's vision shall come to be.§!"

 AFG_habibullah_kalakani: "Habibullah Kalakani"
 AFG_habibullah_kalakani_leader_desc: "§YBorn:§! §LJanuary 19th, 1891, in Kalakan, Kabul Vilayet, Emirate of Afghanistan§!\n§YBackground:§! §LAn ethnic Tajik, Kalakani was a longtime officer in the Afghan Royal Army who deserted a bit before the chaos of the collapse of the British Empire. Using that chaos and the regular army's pre-occupation, Kalakani turned to a life of crime. Once the army managed to restore a modicum of order, however, Kalakani fled and sought the protection of his Tajik co-ethnics.\nOutspokenly opposed to the reforms and modernisation campaigns of Amanullah Khan, Kalakani came to head a rural ultra-conservative movement bearing his name. Rather shockingly, his movement successfully overthrew Amanullah and Kalakani has won the Afghan crown.§!"

