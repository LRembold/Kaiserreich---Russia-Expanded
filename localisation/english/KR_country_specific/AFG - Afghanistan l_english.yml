#Focuses
 AFG_Industrialization_F: "Qargha Dam"
 AFG_Industrialization_F_desc: "The Dam to be built in Qargha will be a great boom for the agricultural economy of Kabul province, by granting access to fresh water for irrigation. The experience gained by undertaking this massive project will be essential for future infrastructure projects."
 AFG_Industrialization2_F: "Kabul Steel Mills"
 AFG_Industrialization2_F_desc: "Every industrialized country needs Steel in great quantities. While our industry is still small, and mostly dependant on very small foreign Steel imports, the creation of a Steel Mill will be a great boom to our industrial projects, and bring much needed expertise. Together with the Mill the government also has approved a land clearing program close to the future Mill, in hopes of building a military industrial complex to modernize and standardise our rifles and ammunition."
#Weapons
 AFG_infantry_equipment_1: "Mauser T98"
 AFG_infantry_equipment_1_short: "Mauser T98"
 AFG_infantry_equipment_1_desc: "The Mauser T98 is the main service rifle of the Afghan Royal Army after standardisation reforms during the 1920s. Being the main service rifle of the Ottoman Army during the Weltkrieg, The Ottoman M1903, chambered in 7.65mm, was the most common variant of Mauser in use and after the war thousands of those weapons were stored in Ottoman arsenals. As part of the military mission the Ottomans sold these surplus weapons at very low prices to Afghanistan, who used them to equip its first 3 Royal Army divisions."
 AFG_infantry_equipment_0: "Khyber Pass copies"
 AFG_infantry_equipment_0_short: "Khyber Pass copy"
 AFG_infantry_equipment_0_desc: "During the late 1800s and early 1900s artisanal weaponsmiths in Afghanistan and the Raj produced great quantities of copied versions of a vast amount of imported guns, specially british firemans. Those artisinal industries produced guns with varied levels of quality, but mostly poor ones, and are responsible for equiping the tribal militas and the early afghan military."