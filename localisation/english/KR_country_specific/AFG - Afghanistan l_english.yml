 #Decisions
 AFG_Quetta_Border: "Seize the province of Quetta"
 AFG_Quetta_Border_desc: "The dispute between ourselves and Punjab is once again at a boiling point. With the war between the Punjabis and the INC we have the opportunity to seize the province of Quetta. A lightining campaign into Quetta will bring the Punjabis to the negotiation table, and spare our contries from a long war."
